<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drawer System Designer - Lite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: var(--bg); overflow: hidden; }
        header { height: 50px; background: var(--primary); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        aside { width: 300px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 15px; flex-shrink: 0; }
        .view-container { flex: 1; display: flex; flex-direction: column; }
        #container3d { flex: 1; background: #e0e0e0; position: relative; }
        #container2d { height: 250px; background: white; border-top: 3px solid var(--primary); display: flex; }
        .canvas-half { flex: 1; border-right: 1px solid #eee; position: relative; }
        canvas { display: block; width: 100% !important; height: 100% !important; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; color: #666; margin-bottom: 2px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .btn { border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin: 5px 0; }
        .btn-stl { background: #27ae60; width: 100%; }
        .btn-slide { background: var(--accent); width: 100%; }
        .tag { position: absolute; top: 5px; left: 10px; font-size: 9px; color: #aaa; pointer-events: none; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>

<header>
    <strong>Drawer Designer Pro</strong>
    <button style="background:none; border:1px solid white; color:white; border-radius:4px; padding:4px 10px;" onclick="resetView()">視点リセット</button>
</header>

<div class="main-layout">
    <aside>
        <button class="btn btn-slide" onclick="toggleDrawer()">引き出しを開閉する</button>
        <hr>
        <div class="input-row">
            <div class="input-group"><label>構造</label><select id="mode"><option value="tray">ケースのみ</option><option value="drawer" selected>外枠セット</option></select></div>
            <div class="input-group"><label>クリアランス</label><select id="clearance"><option value="0.15">0.15mm</option><option value="0.25" selected>0.25mm</option></select></div>
        </div>
        <label>ケース内寸 W / D / H (mm)</label>
        <div class="input-row">
            <input type="number" id="w_val" value="100"><input type="number" id="d_val" value="120"><input type="number" id="h_val" value="40">
        </div>
        <div class="input-row">
            <div class="input-group"><label>壁厚 (mm)</label><input type="number" id="thick" value="2.0" step="0.1"></div>
            <div class="input-group"><label>縦分割</label><input type="number" id="n_v" value="1" min="0"></div>
            <div class="input-group"><label>横分割</label><input type="number" id="n_h" value="1" min="0"></div>
        </div>
        <button class="btn btn-stl" onclick="exportSTL()">STLを保存する</button>
        <div id="stats" style="font-size: 11px; color: #7f8c8d; margin-top: 10px; line-height: 1.5;"></div>
    </aside>

    <div class="view-container">
        <div id="container3d"><div class="tag">3D PREVIEW (DRAG TO ROTATE)</div></div>
        <div id="container2d">
            <div class="canvas-half"><div class="tag">TOP VIEW (DRAG LINES)</div><canvas id="canvasTop"></canvas></div>
            <div class="canvas-half"><div class="tag">FRONT VIEW</div><canvas id="canvasFront"></canvas></div>
        </div>
    </div>
</div>

<script>
    const state = { w:100, d:120, h:40, t:2, mode:'drawer', clearance:0.25, vParts:[50], hParts:[60], open:false, slide:0, selected:null };

    // --- 3D Engine ---
    const container3d = document.getElementById('container3d');
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0xf0f0f0);
    const camera = new THREE.PerspectiveCamera(45, 1, 1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    container3d.appendChild(renderer.domElement);
    const trayGroup = new THREE.Group(); const shellGroup = new THREE.Group();
    scene.add(trayGroup); scene.add(shellGroup);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(100, 500, 200); scene.add(sun);
    
    let theta = -Math.PI/4, phi = Math.PI/3, radius = 450;
    function updateCamera() {
        camera.position.set(radius*Math.sin(phi)*Math.cos(theta), radius*Math.cos(phi), radius*Math.sin(phi)*Math.sin(theta));
        camera.lookAt(0, state.h/2, 0);
    }
    function resetView() { theta = -Math.PI/4; phi = Math.PI/3; updateCamera(); }
    function toggleDrawer() { state.open = !state.open; }

    function updateModel() {
        trayGroup.clear(); shellGroup.clear();
        const mat = new THREE.MeshPhongMaterial({ color: 0x3498db });
        const shellMat = new THREE.MeshPhongMaterial({ color: 0x2c3e50, transparent: true, opacity: 0.3 });
        const tw = state.w + state.t*2, td = state.d + state.t*2, th = state.h + state.t;

        // Tray (Body)
        const floor = new THREE.Mesh(new THREE.BoxGeometry(tw, state.t, td), mat);
        floor.position.y = state.t/2; trayGroup.add(floor);
        const walls = [
            {s:[state.t, state.h, td], p:[-(state.w/2+state.t/2), state.h/2+state.t, 0]},
            {s:[state.t, state.h, td], p:[(state.w/2+state.t/2), state.h/2+state.t, 0]},
            {s:[state.w, state.h, state.t], p:[0, state.h/2+state.t, -(state.d/2+state.t/2)]},
            {s:[state.w, state.h, state.t], p:[0, state.h/2+state.t, (state.d/2+state.t/2)]}
        ];
        walls.forEach(w => { const m = new THREE.Mesh(new THREE.BoxGeometry(...w.s), mat); m.position.set(...w.p); trayGroup.add(m); });

        // Partitions
        state.vParts.forEach(vp => {
            const v = new THREE.Mesh(new THREE.BoxGeometry(state.t-state.clearance, state.h, state.d), mat);
            v.position.set(-state.w/2 + vp, state.h/2+state.t, 0); trayGroup.add(v);
        });
        state.hParts.forEach(hp => {
            const h = new THREE.Mesh(new THREE.BoxGeometry(state.w, state.h, state.t-state.clearance), mat);
            h.position.set(0, state.h/2+state.t, -state.d/2+hp); trayGroup.add(h);
        });

        // Shell
        if (state.mode === 'drawer') {
            const gap = 0.15;
            const sw = tw+gap*2+state.t*2, sd = td+gap, sh = th+gap+state.t;
            const shellParts = [
                {s:[state.t, sh, sd], p:[-(tw/2+gap+state.t/2), sh/2, -gap/2]},
                {s:[state.t, sh, sd], p:[(tw/2+gap+state.t/2), sh/2, -gap/2]},
                {s:[sw, state.t, sd], p:[0, sh-state.t/2, -gap/2]},
                {s:[sw, state.t, sd], p:[0, state.t/2, -gap/2]},
                {s:[sw-state.t*2, sh-state.t*2, state.t], p:[0, sh/2, -(td/2+gap+state.t/2)]}
            ];
            shellParts.forEach(sp => { const m = new THREE.Mesh(new THREE.BoxGeometry(...sp.s), shellMat); m.position.set(...sp.p); shellGroup.add(m); });
        }
        document.getElementById('stats').innerHTML = `本体: ${tw.toFixed(1)}x${td.toFixed(1)}x${th.toFixed(1)}mm<br>外枠: ${(tw+4.3).toFixed(1)}x${(td+2.2).toFixed(1)}mm`;
    }

    // --- 2D GUI ---
    const cTop = document.getElementById('canvasTop'), cFront = document.getElementById('canvasFront');
    function draw2D() {
        [cTop, cFront].forEach(c => { c.width = c.offsetWidth; c.height = c.offsetHeight; });
        const ctxT = cTop.getContext('2d'), ctxF = cFront.getContext('2d');
        const sc = Math.min((cTop.width-40)/state.w, (cTop.height-40)/state.d);
        const ox = cTop.width/2, oy = cTop.height/2;
        const tx = (v) => v*sc, x0 = ox - tx(state.w/2), y0 = oy - tx(state.d/2);

        ctxT.strokeStyle = "#333"; ctxT.strokeRect(x0, y0, tx(state.w), tx(state.d));
        state.vParts.forEach((p,i) => {
            ctxT.strokeStyle = (state.selected?.type==='v'&&state.selected.i===i)?"red":"#3498db";
            ctxT.beginPath(); ctxT.moveTo(x0+tx(p), y0); ctxT.lineTo(x0+tx(p), y0+tx(state.d)); ctxT.stroke();
        });
        state.hParts.forEach((p,i) => {
            ctxT.strokeStyle = (state.selected?.type==='h'&&state.selected.i===i)?"red":"#3498db";
            ctxT.beginPath(); ctxT.moveTo(x0, y0+tx(p)); ctxT.lineTo(x0+tx(state.w), y0+tx(p)); ctxT.stroke();
        });

        // Front view simple
        const fs = Math.min((cFront.width-40)/(state.w+10), (cFront.height-40)/(state.h+10));
        ctxF.strokeRect(cFront.width/2 - (state.w*fs)/2, cFront.height/2 - (state.h*fs)/2, state.w*fs, state.h*fs);
    }

    function sync() {
        state.w = parseFloat(w_val.value); state.d = parseFloat(d_val.value); state.h = parseFloat(h_val.value);
        state.t = parseFloat(thick.value); state.mode = mode.value; state.clearance = parseFloat(clearance.value);
        const nv = parseInt(n_v.value), nh = parseInt(n_h.value);
        if(state.vParts.length!==nv) state.vParts = Array.from({length:nv},(_,i)=>(state.w/(nv+1))*(i+1));
        if(state.hParts.length!==nh) state.hParts = Array.from({length:nh},(_,i)=>(state.d/(nh+1))*(i+1));
        updateModel(); draw2D(); updateCamera();
    }

    // --- Interaction ---
    let is3D = false, pM = {x:0, y:0};
    container3d.addEventListener('mousedown', e => { is3D = true; pM = {x:e.clientX, y:e.clientY}; });
    window.addEventListener('mousemove', e => {
        if(is3D) { theta += (e.clientX-pM.x)*0.01; phi -= (e.clientY-pM.y)*0.01; pM = {x:e.clientX, y:e.clientY}; updateCamera(); }
        if(state.selected) {
            const r = cTop.getBoundingClientRect(); const sc = Math.min((cTop.width-40)/state.w, (cTop.height-40)/state.d);
            const px = (e.clientX-r.left-cTop.width/2)/sc + state.w/2, py = (e.clientY-r.top-cTop.height/2)/sc + state.d/2;
            if(state.selected.type==='v') state.vParts[state.selected.i] = Math.max(0, Math.min(state.w, px));
            else state.hParts[state.selected.i] = Math.max(0, Math.min(state.d, py));
            updateModel(); draw2D();
        }
    });
    window.addEventListener('mouseup', () => { is3D = false; state.selected = null; });
    cTop.addEventListener('mousedown', e => {
        const r = cTop.getBoundingClientRect(); const sc = Math.min((cTop.width-40)/state.w, (cTop.height-40)/state.d);
        const px = (e.clientX-r.left-cTop.width/2)/sc + state.w/2, py = (e.clientY-r.top-cTop.height/2)/sc + state.d/2;
        state.vParts.forEach((p,i) => { if(Math.abs(p-px)<10) state.selected = {type:'v', i}; });
        state.hParts.forEach((p,i) => { if(Math.abs(p-py)<10) state.selected = {type:'h', i}; });
    });

    function exportSTL() {
        let stl = "solid storage\n";
        trayGroup.traverse(m => { if(m.isMesh) {
            const g = m.geometry.clone(); g.applyMatrix4(m.matrixWorld); const p = g.attributes.position;
            for(let i=0; i<p.count; i+=3) {
                stl += `facet normal 0 0 0\nouter loop\n`;
                for(let j=0; j<3; j++) stl += `vertex ${p.getX(i+j)} ${p.getY(i+j)} ${p.getZ(i+j)}\n`;
                stl += `endloop\nendfacet\n`;
            }
        }});
        stl += "endsolid storage";
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([stl])); a.download = `drawer_design.stl`; a.click();
    }

    window.addEventListener('resize', () => { renderer.setSize(container3d.clientWidth, container3d.clientHeight); camera.aspect = container3d.clientWidth/container3d.clientHeight; camera.updateProjectionMatrix(); draw2D(); });
    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', sync));
    function animate() { requestAnimationFrame(animate); state.slide += ((state.open ? state.d*0.8 : 0) - state.slide)*0.1; trayGroup.position.z = state.slide; renderer.render(scene, camera); }
    sync(); animate();
</script>
</body>
</html>
