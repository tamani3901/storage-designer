<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dケースデザイナー - 統合版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
        
        :root {
            --bg: #0e0e10;
            --panel: #16161a;
            --panel2: #1e1e24;
            --border: #2a2a32;
            --border2: #3a3a46;
            --accent: #f0c040;
            --accent2: #c89a28;
            --text: #e8e8ec;
            --text2: #888896;
            --text3: #484858;
            --dc: #4a9eff;
            --danger: #ff5548;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 18px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ツールバー/サイドバーのスタイル */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-section {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: 15px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        /* プレビューエリア */
        #viewport {
            flex: 1;
            background: radial-gradient(circle at center, #1e1e24 0%, #0e0e10 100%);
            position: relative;
        }

        /* 入力要素のスタイル */
        input, select, button {
            background: var(--panel2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            width: 100%;
            font-family: inherit;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            cursor: pointer;
            background: var(--accent);
            color: var(--bg);
            font-weight: 600;
            border: none;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .export-btn {
            background: var(--dc);
            color: white;
        }

        /* ZIP生成用の不可視CanvasやUIパーツ等 */
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">CASE MODELER v2.1</div>
    <div class="header-actions">
        </div>
</header>

<div class="main-container">
    <aside class="sidebar">
        <div class="panel-section">
            <div class="section-title">寸法設定 (mm)</div>
            <label>幅: <input type="number" id="width" value="100"></label>
            <label>奥行: <input type="number" id="depth" value="60"></label>
            <label>高さ: <input type="number" id="height" value="30"></label>
            <label>厚み: <input type="number" id="thickness" value="2"></label>
        </div>

        <div class="panel-section">
            <div class="section-title">エクスポート</div>
            <button class="export-btn" onclick="exportProject()">プロジェクトを保存 (.zip)</button>
        </div>
    </aside>

    <main id="viewport">
        </main>
</div>

<script>
    // ---------------------------------------------------------
    // ZIP生成ロジック (両バージョンに含まれていた共通機能を整理)
    // ---------------------------------------------------------
    
    function exportProject() {
        // 現在のパラメータを取得
        const config = {
            w: document.getElementById('width').value,
            d: document.getElementById('depth').value,
            h: document.getElementById('height').value,
            t: document.getElementById('thickness').value,
            timestamp: new Date().toISOString()
        };

        const jsonStr = JSON.stringify(config, null, 2);
        const encoder = new TextEncoder();
        const data = encoder.encode(jsonStr);

        // ファイル名
        const fileName = "case_design.json";
        
        // ver2.0で実装されていたZIPアーカイブ作成
        createZip([{name: fileName, data: data}]).then(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "case_project_total.zip";
            a.click();
            URL.revokeObjectURL(url);
        });
    }

    // ZIPフォーマット生成用関数群
    async function createZip(entries) {
        const off = [], files = [];
        let cur = 0;

        for (const e of entries) {
            const crc = crc32(e.data);
            const lh = lHdr(encoder.encode(e.name), e.data.length, crc);
            files.push({lh, data: e.data, name: e.name, crc, sz: e.data.length, o: cur});
            cur += lh.length + e.data.length;
        }

        const cd = files.map(e => cHdr(encoder.encode(e.name), e.sz, e.crc, e.o));
        const cdTotal = cd.reduce((a, b) => a + b.length, 0);
        
        return new Blob([
            ...files.flatMap(e => [e.lh, e.data]),
            ...cd,
            eocd(entries.length, cdTotal, cur)
        ], {type: 'application/zip'});
    }

    const encoder = new TextEncoder();

    function lHdr(n, sz, crc) {
        const b = new ArrayBuffer(30 + n.length), v = new DataView(b);
        v.setUint32(0, 0x04034b50, true);
        v.setUint16(4, 20, true);
        [6, 8, 10, 12].forEach(i => v.setUint16(i, 0, true));
        v.setUint32(14, crc, true);
        v.setUint32(18, sz, true);
        v.setUint32(22, sz, true);
        v.setUint16(26, n.length, true);
        v.setUint16(28, 0, true);
        new Uint8Array(b).set(n, 30);
        return new Uint8Array(b);
    }

    function cHdr(n, sz, crc, o) {
        const b = new ArrayBuffer(46 + n.length), v = new DataView(b);
        v.setUint32(0, 0x02014b50, true);
        v.setUint16(4, 20, true);
        v.setUint16(6, 20, true);
        [8, 10, 12, 14].forEach(i => v.setUint16(i, 0, true));
        v.setUint32(16, crc, true);
        v.setUint32(20, sz, true);
        v.setUint32(24, sz, true);
        v.setUint16(28, n.length, true);
        [30, 32, 34, 36, 38].forEach(i => v.setUint16(i, 0, true));
        v.setUint32(42, o, true);
        new Uint8Array(b).set(n, 46);
        return new Uint8Array(b);
    }

    function eocd(c, sz, o) {
        const b = new ArrayBuffer(22), v = new DataView(b);
        v.setUint32(0, 0x06054b50, true);
        v.setUint16(4, 0, true);
        v.setUint16(6, 0, true);
        v.setUint16(8, c, true);
        v.setUint16(10, c, true);
        v.setUint32(12, sz, true);
        v.setUint32(16, o, true);
        v.setUint16(20, 0, true);
        return new Uint8Array(b);
    }

    function crc32(d) {
        let c = -1;
        for (let i = 0; i < d.length; i++) {
            c = (c >>> 8) ^ T[(c ^ d[i]) & 0xFF];
        }
        return (c ^ -1) >>> 0;
    }

    const T = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
        let r = i;
        for (let j = 0; j < 8; j++) r = (r & 1) ? (0xEDB88320 ^ (r >>> 1)) : (r >>> 1);
        T[i] = r;
    }

    // 初期化処理など
    window.onload = () => {
        console.log("3D Case Modeler 統合版 起動完了");
    };
</script>

</body>
</html>
