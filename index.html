<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>モジュラー収納ツール</title>

  <!-- ✅ Three.js CDN -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #ui {
      display: flex;
      height: 100%;
    }

    #sidebar {
      width: 250px;
      padding: 10px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      background-color: #f0f0f0;
      box-sizing: border-box;
    }

    #preview {
      flex-grow: 1;
      position: relative;
    }

    #threeCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    input[type="number"] {
      width: 60px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div id="ui">
    <div id="sidebar">
      <label>幅: <input type="number" id="inputWidth" value="100" /></label><br>
      <label>高さ: <input type="number" id="inputHeight" value="50" /></label><br>
    </div>

    <div id="preview">
      <canvas id="threeCanvas"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('threeCanvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas });
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);

    // 簡易光源
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(100, 100, 100).normalize();
    scene.add(light);

    // カメラ位置
    camera.position.z = 200;

    // 初期ボックス
    let cube;
    function createBox(w, h) {
      if (cube) scene.remove(cube);
      const geometry = new THREE.BoxGeometry(w, h, 100);
      const material = new THREE.MeshNormalMaterial();
      cube = new THREE.Mesh(geometry, material);
      scene.add(cube);
    }

    // 初期表示
    createBox(100, 50);

    // 入力イベント
    document.getElementById('inputWidth').addEventListener('input', () => {
      const w = parseFloat(document.getElementById('inputWidth').value);
      const h = parseFloat(document.getElementById('inputHeight').value);
      createBox(w, h);
    });
    document.getElementById('inputHeight').addEventListener('input', () => {
      const w = parseFloat(document.getElementById('inputWidth').value);
      const h = parseFloat(document.getElementById('inputHeight').value);
      createBox(w, h);
    });

    // アニメーション
    function animate() {
      requestAnimationFrame(animate);
      if (cube) cube.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();
  </script>

</body>
</html>
