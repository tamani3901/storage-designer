<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drawer System Designer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f0f3f5; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: var(--bg); overflow: hidden; }
        header { height: 50px; background: var(--primary); color: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        aside { width: 320px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 15px; flex-shrink: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .view-container { flex: 1; display: flex; flex-direction: column; }
        #container3d { flex: 1; background: #e8e8e8; position: relative; }
        #container2d { height: 250px; background: white; border-top: 2px solid var(--primary); display: flex; }
        .canvas-half { flex: 1; border-right: 1px solid #eee; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 10px; font-weight: bold; color: #666; margin-bottom: 2px; }
        input, select { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .btn { border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; color: white; }
        .btn-stl { background: #27ae60; width: 100%; }
        .btn-slide { background: var(--accent); width: 100%; margin-bottom: 10px; }
        .dim-box { background: #f8f9fa; padding: 10px; border-radius: 4px; font-size: 11px; margin-top: 10px; border: 1px solid #eee; line-height: 1.4; }
        .label-tag { position: absolute; top: 5px; left: 10px; font-size: 9px; color: rgba(0,0,0,0.4); pointer-events: none; z-index: 10; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <strong>Drawer System Designer</strong>
    <span id="info" style="font-size:11px; opacity:0.8;">iPad Touch Ready</span>
</header>

<div class="main-layout">
    <aside>
        <button class="btn btn-slide" onclick="toggleDrawer()">引き出しを開閉する</button>
        
        <div class="input-row">
            <div class="input-group">
                <label>構造</label>
                <select id="mode"><option value="tray">ケース単体</option><option value="drawer" selected>引き出しセット</option></select>
            </div>
            <div class="input-group">
                <label>クリアランス</label>
                <select id="clearance"><option value="0.15">0.15mm</option><option value="0.25" selected>0.25mm</option><option value="0.35">0.35mm</option></select>
            </div>
        </div>

        <label>内寸 W / D / H (mm)</label>
        <div class="input-row">
            <input type="number" id="w_val" value="80">
            <input type="number" id="d_val" value="120">
            <input type="number" id="h_val" value="40">
        </div>

        <label>壁厚 / 底厚 / 仕切り(V / H)</label>
        <div class="input-row">
            <input type="number" id="thick" value="2.0" step="0.1">
            <input type="number" id="n_v" value="1" min="0">
            <input type="number" id="n_h" value="1" min="0">
        </div>

        <div class="dim-box" id="dim_list"></div>
        <button class="btn btn-stl" onclick="exportSTL()">STL書き出し</button>
    </aside>

    <div class="view-container">
        <div id="container3d">
            <div class="label-tag">3D PREVIEW (Rotate/Zoom)</div>
        </div>
        <div id="container2d">
            <div class="canvas-half">
                <div class="label-tag">TOP VIEW (Drag Partitions)</div>
                <canvas id="canvasTop"></canvas>
            </div>
            <div class="canvas-half">
                <div class="label-tag">FRONT VIEW (Outer Frame)</div>
                <canvas id="canvasFront"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const state = { w:80, d:120, h:40, t:2, mode:'drawer', clearance:0.25, vParts:[40], hParts:[60], open:false, slide:0 };

    // --- Three.js Setup ---
    const container3d = document.getElementById('container3d');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe8e8e8);
    const camera = new THREE.PerspectiveCamera(45, 1, 1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    container3d.appendChild(renderer.domElement);
    const trayGroup = new THREE.Group();
    const shellGroup = new THREE.Group();
    scene.add(trayGroup); scene.add(shellGroup);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(200, 400, 300); scene.add(light);
    scene.add(new THREE.GridHelper(500, 50));

    let theta = -Math.PI/4, phi = Math.PI/3, radius = 400;
    function updateCamera() {
        camera.position.set(radius*Math.sin(phi)*Math.cos(theta), radius*Math.cos(phi), radius*Math.sin(phi)*Math.sin(theta));
        camera.lookAt(0, state.h/2, 0);
    }

    function toggleDrawer() { state.open = !state.open; }

    function updateModel() {
        trayGroup.clear(); shellGroup.clear();
        const mat = new THREE.MeshPhongMaterial({ color: 0x3498db });
        const shellMat = new THREE.MeshPhongMaterial({ color: 0x2c3e50, transparent: true, opacity: 0.3 });

        // --- Tray (引き出し本体) ---
        const tw = state.w + state.t*2, td = state.d + state.t*2, th = state.h + state.t;
        // 底・壁
        const floor = new THREE.Mesh(new THREE.BoxGeometry(tw, state.t, td), mat);
        floor.position.y = state.t/2; trayGroup.add(floor);

        const walls = [
            {s:[state.t, state.h, td], p:[-(state.w/2+state.t/2), state.h/2+state.t, 0]},
            {s:[state.t, state.h, td], p:[(state.w/2+state.t/2), state.h/2+state.t, 0]},
            {s:[state.w, state.h, state.t], p:[0, state.h/2+state.t, -(state.d/2+state.t/2)]},
            {s:[state.w, state.h, state.t], p:[0, state.h/2+state.t, (state.d/2+state.t/2)]}
        ];
        walls.forEach(w => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(...w.s), mat);
            m.position.set(...w.p); trayGroup.add(m);
        });

        // 仕切り
        state.vParts.forEach(vp => {
            const v = new THREE.Mesh(new THREE.BoxGeometry(state.t-state.clearance, state.h, state.d), mat);
            v.position.set(-state.w/2 + vp, state.h/2+state.t, 0); trayGroup.add(v);
        });
        state.hParts.forEach(hp => {
            const h = new THREE.Mesh(new THREE.BoxGeometry(state.w, state.h, state.t-state.clearance), mat);
            h.position.set(0, state.h/2+state.t, -state.d/2 + hp); trayGroup.add(h);
        });

        // --- Shell (外枠) ---
        if (state.mode === 'drawer') {
            const gap = 0.1; // 固定隙間
            const sw = tw + gap*2 + state.t*2, sd = td + gap, sh = th + gap + state.t;
            
            const sWalls = [
                {s:[state.t, sh, sd], p:[-(tw/2+gap+state.t/2), sh/2, -gap/2]}, // 左
                {s:[state.t, sh, sd], p:[(tw/2+gap+state.t/2), sh/2, -gap/2]},  // 右
                {s:[tw+gap*2, state.t, sd], p:[0, sh - state.t/2, -gap/2]},     // 天
                {s:[tw+gap*2, state.t, sd], p:[0, state.t/2, -gap/2]},          // 底
                {s:[tw+gap*2, sh, state.t], p:[0, sh/2, -(td/2+gap+state.t/2)]} // 奥
            ];
            sWalls.forEach(w => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(...w.s), shellMat);
                m.position.set(...w.p); shellGroup.add(m);
            });
        }

        updateStats();
    }

    function updateStats() {
        const tw = state.w + state.t*2, td = state.d + state.t*2, th = state.h + state.t;
        document.getElementById('dim_list').innerHTML = `
            <strong>本体外寸:</strong> ${tw.toFixed(1)} x ${td.toFixed(1)} x ${th.toFixed(1)}mm<br>
            <strong>外枠外寸:</strong> ${(tw+4.2).toFixed(1)} x ${(td+2.1).toFixed(1)} x ${(th+4.1).toFixed(1)}mm<br>
            <small>※外枠は壁厚2mm+隙間0.1mmで計算</small>
        `;
    }

    // --- 2D Drawing ---
    const cTop = document.getElementById('canvasTop'), cFront = document.getElementById('canvasFront');
    function draw2D() {
        [cTop, cFront].forEach(c => { c.width = c.offsetWidth; c.height = c.offsetHeight; });
        const ctxT = cTop.getContext('2d'), ctxF = cFront.getContext('2d');
        const sc = Math.min((cTop.width-40)/state.w, (cTop.height-40)/state.d);
        const ox = cTop.width/2, oy = cTop.height/2;

        // Top View
        ctxT.strokeStyle = "#333"; ctxT.strokeRect(ox - (state.w*sc)/2, oy - (state.d*sc)/2, state.w*sc, state.d*sc);
        state.vParts.forEach(p => { ctxT.beginPath(); ctxT.moveTo(ox - (state.w*sc)/2 + p*sc, oy - (state.d*sc)/2); ctxT.lineTo(ox - (state.w*sc)/2 + p*sc, oy + (state.d*sc)/2); ctxT.stroke(); });

        // Front View (Shell visualization)
        const fs = Math.min((cFront.width-40)/(state.w+10), (cFront.height-40)/(state.h+10));
        const fox = cFront.width/2, foy = cFront.height/2;
        ctxF.strokeStyle = "#2c3e50"; ctxF.lineWidth = 2;
        ctxF.strokeRect(fox - ((state.w+state.t*2+4)*fs)/2, foy - (state.h*fs)/2, (state.w+state.t*2+4)*fs, (state.h+state.t*2)*fs);
        ctxF.fillStyle = "rgba(52, 152, 219, 0.5)";
        ctxF.fillRect(fox - (state.w*fs)/2, fox - (state.h*fs)/2, state.w*fs, state.h*fs);
    }

    // --- Interaction ---
    function sync() {
        state.w = parseFloat(w_val.value); state.d = parseFloat(d_val.value); state.h = parseFloat(h_val.value);
        state.t = parseFloat(thick.value); state.mode = mode.value; state.clearance = parseFloat(clearance.value);
        const nv = parseInt(n_v.value), nh = parseInt(n_h.value);
        if(state.vParts.length !== nv) state.vParts = Array.from({length:nv}, (_,i)=>(state.w/(nv+1))*(i+1));
        if(state.hParts.length !== nh) state.hParts = Array.from({length:nh}, (_,i)=>(state.d/(nh+1))*(i+1));
        updateModel(); draw2D(); updateCamera();
    }

    let is3D = false, pM = {x:0, y:0};
    container3d.addEventListener('mousedown', e => { is3D = true; pM = {x:e.clientX, y:e.clientY}; });
    window.addEventListener('mousemove', e => {
        if(!is3D) return;
        theta += (e.clientX - pM.x)*0.01; phi -= (e.clientY - pM.y)*0.01;
        pM = {x:e.clientX, y:e.clientY}; updateCamera();
    });
    window.addEventListener('mouseup', () => is3D = false);

    window.addEventListener('resize', () => { renderer.setSize(container3d.clientWidth, container3d.clientHeight); camera.aspect = container3d.clientWidth/container3d.clientHeight; camera.updateProjectionMatrix(); draw2D(); });
    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', sync));

    function animate() {
        requestAnimationFrame(animate);
        const targetSlide = state.open ? state.d * 0.8 : 0;
        state.slide += (targetSlide - state.slide) * 0.1;
        trayGroup.position.z = state.slide;
        renderer.render(scene, camera);
    }

    sync(); resetView(); animate();
</script>
</body>
</html>
