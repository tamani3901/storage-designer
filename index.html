<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Storage Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #ecf0f1; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: var(--bg); overflow: hidden; }
        header { height: 45px; background: var(--primary); color: white; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* サイドバー */
        aside { width: 300px; background: white; border-right: 1px solid #ccc; overflow-y: auto; padding: 15px; flex-shrink: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        
        /* 3D・2Dエリア */
        .view-container { flex: 1; display: flex; flex-direction: column; }
        #container3d { flex: 1; min-height: 0; position: relative; background: #dfe6e9; }
        #container2d { height: 260px; background: white; border-top: 3px solid var(--primary); display: flex; }
        
        canvas { width: 100% !important; height: 100% !important; display: block; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 3px; }
        .row { display: flex; gap: 5px; }
        input { width: 100%; padding: 7px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .info { font-size: 11px; background: #f8f9fa; padding: 10px; border-radius: 4px; margin-top: 15px; border: 1px solid #eee; }
        .tag { position: absolute; top: 10px; left: 10px; font-size: 10px; font-weight: bold; color: rgba(0,0,0,0.2); pointer-events: none; }
    </style>
</head>
<body>

<header>
    <strong>STORAGE ENGINE PRO</strong>
</header>

<div class="main-layout">
    <aside>
        <div class="input-group">
            <label>引き出し内寸 W / D / H (mm)</label>
            <div class="row">
                <input type="number" id="w_val" value="100" oninput="sync()">
                <input type="number" id="d_val" value="120" oninput="sync()">
                <input type="number" id="h_val" value="40" oninput="sync()">
            </div>
        </div>
        <div class="input-group">
            <label>肉厚 (引き出し / 外枠)</label>
            <div class="row">
                <input type="number" id="t_tray" value="2.0" step="0.1" oninput="sync()">
                <input type="number" id="t_shell" value="2.5" step="0.1" oninput="sync()">
            </div>
        </div>
        <div class="input-group">
            <label>クリアランス (隙間 mm)</label>
            <input type="number" id="gap" value="1.0" step="0.1" oninput="sync()">
        </div>
        <div class="info" id="out_dim">
            計算結果を表示中...
        </div>
        <button class="btn" onclick="exportSTL()">STLエクスポート</button>
    </aside>

    <div class="view-container">
        <div id="container3d">
            <div class="tag">3D PREVIEW (DRAG TO ROTATE / WHEEL TO ZOOM)</div>
        </div>
        <div id="container2d">
            <div id="canvasTopWrapper" style="flex:1; position:relative; border-right:1px solid #eee;">
                <div class="tag">TOP VIEW</div>
                <canvas id="canvasTop"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Global State ---
    const state = { w:100, d:120, h:40, tt:2, ts:2.5, gap:1.0 };
    
    // --- Three.js Initialization ---
    const c3d = document.getElementById('container3d');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, c3d.clientWidth / c3d.clientHeight, 1, 5000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    c3d.appendChild(renderer.domElement);

    const trayGroup = new THREE.Group();
    const shellGroup = new THREE.Group();
    scene.add(trayGroup, shellGroup);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(200, 500, 300);
    scene.add(light);
    scene.add(new THREE.GridHelper(1000, 50));

    let theta = -Math.PI/4, phi = Math.PI/3, radius = 500;
    
    function updateCamera() {
        camera.position.set(radius*Math.sin(phi)*Math.cos(theta), radius*Math.cos(phi), radius*Math.sin(phi)*Math.sin(theta));
        camera.lookAt(0, 0, 0);
    }

    // --- Core Modeling Logic ---
    function sync() {
        state.w = parseFloat(w_val.value);
        state.d = parseFloat(d_val.value);
        state.h = parseFloat(h_val.value);
        state.tt = parseFloat(t_tray.value);
        state.ts = parseFloat(t_shell.value);
        state.gap = parseFloat(gap.value);

        trayGroup.clear(); shellGroup.clear();
        const mTray = new THREE.MeshPhongMaterial({ color: 0x3498db });
        const mShell = new THREE.MeshPhongMaterial({ color: 0x2c3e50, transparent: true, opacity: 0.4 });

        // Tray (引き出し)
        const tw = state.w + state.tt*2, td = state.d + state.tt*2, th = state.h + state.tt;
        const f = new THREE.Mesh(new THREE.BoxGeometry(tw, state.tt, td), mTray);
        f.position.y = state.tt/2; trayGroup.add(f);
        
        const walls = [
            {s:[state.tt, state.h, td], p:[-(state.w/2+state.tt/2), state.h/2+state.tt, 0]},
            {s:[state.tt, state.h, td], p:[(state.w/2+state.tt/2), state.h/2+state.tt, 0]},
            {s:[state.w, state.h, state.tt], p:[0, state.h/2+state.tt, -(state.d/2+state.tt/2)]},
            {s:[state.w, state.h, state.tt], p:[0, state.h/2+state.tt, (state.d/2+state.tt/2)]}
        ];
        walls.forEach(w => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(...w.s), mTray);
            m.position.set(...w.p); trayGroup.add(m);
        });

        // Shell (外枠) - Inside-Out Logic
        const sw_in = tw + state.gap*2, sd_in = td + state.gap, sh_in = th + state.gap;
        const sw_out = sw_in + state.ts*2, sd_out = sd_in + state.ts, sh_out = sh_in + state.ts*2;
        
        const shellParts = [
            {s:[state.ts, sh_out, sd_out], p:[-(sw_in/2+state.ts/2), sh_out/2, -state.ts/2]},
            {s:[state.ts, sh_out, sd_out], p:[(sw_in/2+state.ts/2), sh_out/2, -state.ts/2]},
            {s:[sw_out, state.ts, sd_out], p:[0, state.ts/2, -state.ts/2]},
            {s:[sw_out, state.ts, sd_out], p:[0, sh_out-state.ts/2, -state.ts/2]},
            {s:[sw_in, sh_in, state.ts], p:[0, sh_out/2, -(sd_in/2+state.ts/2)]}
        ];
        shellParts.forEach(p => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(...p.s), mShell);
            m.position.set(...p.p); shellGroup.add(m);
        });

        // 位置のオフセット表示
        trayGroup.position.x = -sw_out; 
        shellGroup.position.x = sw_out;

        document.getElementById('out_dim').innerHTML = `<strong>外枠外寸:</strong><br>${sw_out.toFixed(1)} x ${sd_out.toFixed(1)} x ${sh_out.toFixed(1)} mm`;
    }

    // --- Mouse Controls ---
    let isDragging = false, lastM = {x:0, y:0};
    c3d.addEventListener('mousedown', e => { isDragging = true; lastM = {x:e.clientX, y:e.clientY}; });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        theta += (e.clientX - lastM.x) * 0.01;
        phi -= (e.clientY - lastM.y) * 0.01;
        phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
        lastM = {x:e.clientX, y:e.clientY};
        updateCamera();
    });
    window.addEventListener('mouseup', () => isDragging = false);
    c3d.addEventListener('wheel', e => { radius += e.deltaY * 0.5; radius = Math.max(100, Math.min(2000, radius)); updateCamera(); e.preventDefault(); }, {passive:false});

    // --- Responsive ---
    function onResize() {
        const w = c3d.clientWidth, h = c3d.clientHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', onResize);
    new ResizeObserver(onResize).observe(c3d);

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    
    // Initial Run
    onResize(); sync(); updateCamera(); animate();

    function exportSTL() { alert("STLデータを生成中..."); }
</script>
</body>
</html>
