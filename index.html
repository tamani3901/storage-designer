<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Storage Designer Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #viewport { width: 100%; height: 500px; background: #1a1a1a; }
        .grid-canvas { border: 2px solid #444; cursor: crosshair; background: #eee; }
    </style>
</head>
<body class="bg-gray-900 text-white">

<div class="flex h-screen">
    <div class="w-1/2 p-4 flex flex-col overflow-y-auto border-r border-gray-700">
        <h2 class="text-xl font-bold mb-4">Edit Mode (2D)</h2>
        <div class="mb-4 space-x-2">
            <button class="bg-blue-600 px-3 py-1 rounded" onclick="setMode('horizontal')">横仕切り追加</button>
            <button class="bg-green-600 px-3 py-1 rounded" onclick="setMode('vertical')">縦仕切り追加</button>
            <button class="bg-red-600 px-3 py-1 rounded" onclick="exportSTL()">STL書き出し</button>
        </div>
        <canvas id="editorCanvas" class="grid-canvas w-full aspect-square"></canvas>
        
        <div class="mt-4 grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm">外枠厚さ (mm)</label>
                <input type="number" id="wallThick" value="2" step="0.1" class="w-full bg-gray-800 p-2 rounded">
            </div>
            <div>
                <label class="block text-sm">仕切り厚さ (mm)</label>
                <input type="number" id="divThick" value="1.5" step="0.1" class="w-full bg-gray-800 p-2 rounded">
            </div>
        </div>
    </div>

    <div class="w-1/2 relative">
        <h2 class="absolute top-4 left-4 z-10 text-xl font-bold">3D View</h2>
        <div id="viewport"></div>
        <div class="p-4 bg-gray-800 border-t border-gray-700 h-full">
            <h3 class="font-bold">パーツリスト</h3>
            <ul id="partList" class="text-sm opacity-70">
                </ul>
        </div>
    </div>
</div>

<script>
/**
 * クラス構成案
 * 1. CaseManager: 全体のサイズと壁の厚みを管理
 * 2. DividerManager: 仕切りの位置、高さ(25-100%)、可動/固定を管理
 * 3. GeometryEngine: CSG.js等を用いて3Dメッシュを生成
 */

// --- Three.js 基本設定 ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/2 / 500, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth / 2, 500);
document.getElementById('viewport').appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7.5).normalize();
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 150;

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// --- 2D 編集ロジック (簡易版) ---
const canvas = document.getElementById('editorCanvas');
const ctx = canvas.getContext('2d');
let dividers = []; // { axis: 'x'|'y', pos: number, height: 1.0 }

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    // スナップ処理 (0.1mm単位など) をここに追加
    update3DModel();
});

function update3DModel() {

}
</script>
</body>
</html>
