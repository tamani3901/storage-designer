<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Storage Designer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; background: #2c3e50; }
        #sidebar { width: 280px; background: white; padding: 20px; z-index: 10; overflow-y: auto; flex-shrink: 0; }
        #viewer { flex: 1; position: relative; touch-action: none; } /* iPadのブラウザスクロールを無効化 */
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .info { background: #fdf2e9; padding: 10px; border-radius: 4px; font-size: 11px; border-left: 4px solid #e67e22; margin-top: 10px; }
        .hint { position: absolute; bottom: 15px; left: 15px; color: white; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="margin-top:0; font-size:18px;">Storage Engine</h3>
    <div class="input-group">
        <label>引き出し内寸 (W/D/H)</label>
        <div style="display:flex; gap:4px;">
            <input type="number" id="w" value="100">
            <input type="number" id="d" value="120">
            <input type="number" id="h" value="40">
        </div>
    </div>
    <div class="input-group">
        <label>肉厚 (引き出し/外枠)</label>
        <div style="display:flex; gap:4px;">
            <input type="number" id="tt" value="2.0" step="0.1">
            <input type="number" id="ts" value="2.5" step="0.1">
        </div>
    </div>
    <div class="input-group">
        <label>遊び (Gap mm)</label>
        <input type="number" id="gap" value="1.0" step="0.1">
    </div>
    <div class="info" id="stats">外枠計算中...</div>
</div>

<div id="viewer">
    <div class="hint">1本指: 回転 / 2本指: ズーム</div>
</div>

<script>
let scene, camera, renderer, tray, shell;
let rotX = -0.5, rotY = 0.5, zoom = 400;

// タッチ・マウス共通の管理
let isPointerDown = false;
let lastPointers = [];
let initialPinchDist = 0;

window.onload = init;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x34495e);
    
    const container = document.getElementById('viewer');
    camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 5000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 0.4);
    sun.position.set(100, 200, 100);
    scene.add(sun);

    tray = new THREE.Group();
    shell = new THREE.Group();
    scene.add(tray, shell);

    // --- Pointer Events (iPad & PC 共通) ---
    container.addEventListener('pointerdown', e => {
        isPointerDown = true;
        lastPointers.push(e);
        if (lastPointers.length === 2) {
            initialPinchDist = getDist(lastPointers[0], lastPointers[1]);
        }
    });

    window.addEventListener('pointermove', e => {
        if (!isPointerDown) return;
        
        // ポインターリストを更新
        const index = lastPointers.findIndex(p => p.pointerId === e.pointerId);
        if (index > -1) lastPointers[index] = e;

        if (lastPointers.length === 1) {
            // 1本指/マウスドラッグ: 回転
            rotY += (e.movementX || 0) * 0.007;
            rotX += (e.movementY || 0) * 0.007;
        } else if (lastPointers.length === 2) {
            // 2本指: ピンチズーム
            const currentDist = getDist(lastPointers[0], lastPointers[1]);
            const diff = currentDist - initialPinchDist;
            zoom -= diff * 1.5;
            initialPinchDist = currentDist;
        }
        zoom = Math.max(50, Math.min(2000, zoom));
    });

    window.addEventListener('pointerup', e => {
        lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId);
        if (lastPointers.length === 0) isPointerDown = false;
    });

    // マウスホイールにも一応対応
    container.addEventListener('wheel', e => { zoom += e.deltaY * 0.5; e.preventDefault(); }, {passive:false});

    document.querySelectorAll('input').forEach(el => el.oninput = build);
    window.onresize = onResize;

    build();
    animate();
}

function getDist(p1, p2) {
    return Math.sqrt(Math.pow(p2.clientX - p1.clientX, 2) + Math.pow(p2.clientY - p1.clientY, 2));
}

function build() {
    const w = parseFloat(document.getElementById('w').value) || 1;
    const d = parseFloat(document.getElementById('d').value) || 1;
    const h = parseFloat(document.getElementById('h').value) || 1;
    const tt = parseFloat(document.getElementById('tt').value) || 0.1;
    const ts = parseFloat(document.getElementById('ts').value) || 0.1;
    const gap = parseFloat(document.getElementById('gap').value) || 0;

    tray.clear(); shell.clear();
    const trayMat = new THREE.MeshPhongMaterial({ color: 0x3498db });
    const shellMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });

    const tw = w + tt * 2, td = d + tt * 2, th = h + tt;
    const sw_out = (tw + gap * 2) + ts * 2, sd_out = (td + gap) + ts, sh_out = (th + gap) + ts * 2;

    // Tray
    const floor = new THREE.Mesh(new THREE.BoxGeometry(tw, tt, td), trayMat);
    floor.position.y = tt/2; tray.add(floor);
    const walls = [[tt,h,td,-(w/2+tt/2),h/2+tt,0],[tt,h,td,(w/2+tt/2),h/2+tt,0],[w,h,tt,0,h/2+tt,-(d/2+tt/2)],[w,h,tt,0,h/2+tt,(d/2+tt/2)]];
    walls.forEach(dat => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(dat[0], dat[1], dat[2]), trayMat);
        m.position.set(dat[3], dat[4], dat[5]); tray.add(m);
    });

    // Shell
    const sParts = [[ts,sh_out,sd_out,-( (tw+gap*2)/2+ts/2 ),sh_out/2,-ts/2],[ts,sh_out,sd_out,( (tw+gap*2)/2+ts/2 ),sh_out/2,-ts/2],[sw_out,ts,sd_out,0,ts/2,-ts/2],[sw_out,ts,sd_out,0,sh_out-ts/2,-ts/2],[tw+gap*2,th+gap,ts,0,sh_out/2,-( (td+gap)/2+ts/2 )]];
    sParts.forEach(dat => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(dat[0], dat[1], dat[2]), shellMat);
        m.position.set(dat[3], dat[4], dat[5]); shell.add(m);
    });

    tray.position.x = -sw_out * 0.6;
    shell.position.x = sw_out * 0.6;
    document.getElementById('stats').innerText = `外枠外寸: ${sw_out.toFixed(1)} x ${sd_out.toFixed(1)} x ${sh_out.toFixed(1)} mm`;
}

function onResize() {
    const container = document.getElementById('viewer');
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
}

function animate() {
    requestAnimationFrame(animate);
    camera.position.set(zoom * Math.sin(rotY) * Math.cos(rotX), zoom * Math.sin(rotX), zoom * Math.cos(rotY) * Math.cos(rotX));
    camera.lookAt(0, 50, 0);
    renderer.render(scene, camera);
}
</script>
</body>
</html>
