<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultimate Hybrid Designer - Stable</title>
<script>
const state = {
    w:100, d:120, h:40,
    tt:2, ts:2.5, gap:1,
    nv:1, vParts:[50],
    open:false, slide:0,
    rotX:-0.5, rotY:0.5,
    zoom:500,
    selected:null
};

let scene, camera, renderer, trayGroup, shellGroup, dimGroup;
let lastPointers=[];

window.onload = () => {
    init3D();
    setupInteraction();
    sync();
    animate();
};

function init3D(){
    const c3d = document.getElementById('container3d');

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe6e9);

    camera = new THREE.PerspectiveCamera(
        45,
        c3d.clientWidth/c3d.clientHeight,
        1,
        5000
    );

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(c3d.clientWidth,c3d.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    c3d.appendChild(renderer.domElement);

    window.addEventListener("resize", onResize);

    scene.add(new THREE.AmbientLight(0xffffff,0.7));
    const sun=new THREE.DirectionalLight(0xffffff,0.5);
    sun.position.set(200,400,200);
    scene.add(sun);

    trayGroup=new THREE.Group();
    shellGroup=new THREE.Group();
    dimGroup=new THREE.Group();

    scene.add(trayGroup,shellGroup,dimGroup);
}

function onResize(){
    const c3d=document.getElementById('container3d');
    camera.aspect=c3d.clientWidth/c3d.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(c3d.clientWidth,c3d.clientHeight);
}

function createTextLabel(text,pos){
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    canvas.width=128;
    canvas.height=64;

    ctx.fillStyle='white';
    ctx.fillRect(0,0,128,64);
    ctx.strokeStyle='#e67e22';
    ctx.lineWidth=4;
    ctx.strokeRect(0,0,128,64);

    ctx.fillStyle='black';
    ctx.font='bold 30px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(text,64,45);

    const tex=new THREE.CanvasTexture(canvas);
    const mat=new THREE.SpriteMaterial({map:tex});
    const sprite=new THREE.Sprite(mat);
    sprite.scale.set(30,15,1);
    sprite.position.copy(pos);

    return sprite;
}

function sync(){
    state.w=parseFloat(in_w.value);
    state.d=parseFloat(in_d.value);
    state.h=parseFloat(in_h.value);
    state.tt=parseFloat(t_tray.value);
    state.ts=parseFloat(t_shell.value);
    state.gap=parseFloat(gap.value);
    state.nv=parseInt(nv.value);

    if(state.vParts.length!==state.nv){
        state.vParts=Array.from(
            {length:state.nv},
            (_,i)=>(state.w/(state.nv+1))*(i+1)
        );
    }

    buildModels();
    draw2D();
}

function buildModels(){
    trayGroup.clear();
    shellGroup.clear();
    dimGroup.clear();

    const matT=new THREE.MeshPhongMaterial({color:0x3498db});
    const matS=new THREE.MeshPhongMaterial({
        color:0xffffff,
        transparent:true,
        opacity:0.3,
        side:THREE.DoubleSide
    });

    const tw=state.w+state.tt*2;
    const td=state.d+state.tt*2;
    const th=state.h+state.tt;

    const sw=(tw+state.gap*2)+state.ts*2;
    const sd=(td+state.gap)+state.ts;
    const sh=(th+state.gap)+state.ts*2;

    // --- Tray ---
    const floor=new THREE.Mesh(
        new THREE.BoxGeometry(tw,state.tt,td),
        matT
    );
    floor.position.y=state.tt/2;
    trayGroup.add(floor);

    [[state.tt,state.h,td,-(state.w/2+state.tt/2),state.h/2+state.tt,0],
     [state.tt,state.h,td,(state.w/2+state.tt/2),state.h/2+state.tt,0],
     [state.w,state.h,state.tt,0,state.h/2+state.tt,-(state.d/2+state.tt/2)],
     [state.w,state.h,state.tt,0,state.h/2+state.tt,(state.d/2+state.tt/2)]
    ].forEach(p=>{
        const m=new THREE.Mesh(
            new THREE.BoxGeometry(p[0],p[1],p[2]),
            matT
        );
        m.position.set(p[3],p[4],p[5]);
        trayGroup.add(m);
    });

    state.vParts.forEach(p=>{
        const v=new THREE.Mesh(
            new THREE.BoxGeometry(state.tt,state.h,state.d),
            matT
        );
        v.position.set(-state.w/2+p,state.h/2+state.tt,0);
        trayGroup.add(v);
    });

    // --- Shell ---
    const shell=new THREE.Mesh(
        new THREE.BoxGeometry(sw,sh,sd),
        matS
    );
    shell.position.y=sh/2;
    shellGroup.add(shell);

    // --- Dimensions ---
    dimGroup.add(createTextLabel(
        `${sw.toFixed(1)}`,
        new THREE.Vector3(0,-15,sd/2)
    ));
    dimGroup.add(createTextLabel(
        `${sh.toFixed(1)}`,
        new THREE.Vector3(sw/2+15,sh/2,0)
    ));
    dimGroup.add(createTextLabel(
        `${sd.toFixed(1)}`,
        new THREE.Vector3(-(sw/2+15),10,0)
    ));

    stats.innerText=
        `外枠外寸: ${sw.toFixed(1)} x ${sd.toFixed(1)} x ${sh.toFixed(1)} mm`;
}

function draw2D(){
    const cT=document.getElementById('canvasTop');
    cT.width=cT.offsetWidth;
    cT.height=cT.offsetHeight;

    const ctxT=cT.getContext('2d');
    ctxT.clearRect(0,0,cT.width,cT.height);

    const sc=Math.min(
        (cT.width-40)/state.w,
        (cT.height-40)/state.d
    );

    const ox=cT.width/2;
    const oy=cT.height/2;

    ctxT.strokeStyle="#2c3e50";
    ctxT.strokeRect(
        ox-state.w*sc/2,
        oy-state.d*sc/2,
        state.w*sc,
        state.d*sc
    );

    state.vParts.forEach((p,i)=>{
        ctxT.strokeStyle=(state.selected?.i===i)
            ?"red":"#3498db";
        ctxT.lineWidth=4;
        ctxT.beginPath();
        ctxT.moveTo(
            ox-state.w*sc/2+p*sc,
            oy-state.d*sc/2
        );
        ctxT.lineTo(
            ox-state.w*sc/2+p*sc,
            oy+state.d*sc/2
        );
        ctxT.stroke();
    });
}

function setupInteraction(){
    const c3d=document.getElementById('container3d');
    const c2d=document.getElementById('canvasTop');

    c3d.addEventListener('pointerdown',e=>{
        lastPointers.push(e);
    });

    window.addEventListener('pointermove',e=>{
        const idx=lastPointers.findIndex(
            p=>p.pointerId===e.pointerId
        );
        if(idx===-1) return;

        const prev=lastPointers[idx];

        if(lastPointers.length===1){

            state.rotY+=(e.clientX-prev.clientX)*0.007;
            state.rotX+=(e.clientY-prev.clientY)*0.007;

            const limit=Math.PI/2.2;
            state.rotX=Math.max(
                -limit,
                Math.min(limit,state.rotX)
            );

        }else if(lastPointers.length===2){

            const p2=lastPointers[1-idx];
            const d1=Math.hypot(
                prev.clientX-p2.clientX,
                prev.clientY-p2.clientY
            );
            const d2=Math.hypot(
                e.clientX-p2.clientX,
                e.clientY-p2.clientY
            );

            state.zoom-=(d2-d1)*2;
            state.zoom=Math.max(
                200,
                Math.min(1200,state.zoom)
            );
        }

        lastPointers[idx]=e;
    });

    window.addEventListener('pointerup',e=>{
        lastPointers=lastPointers.filter(
            p=>p.pointerId!==e.pointerId
        );
    });

    document
        .querySelectorAll('input, select')
        .forEach(el=>el.oninput=sync);
}

function animate(){
    requestAnimationFrame(animate);

    state.slide+=
        ((state.open?state.d:0)-state.slide)*0.1;

    trayGroup.position.z=state.slide;

    camera.position.set(
        state.zoom*Math.sin(state.rotY)*Math.cos(state.rotX),
        state.zoom*Math.sin(state.rotX),
        state.zoom*Math.cos(state.rotY)*Math.cos(state.rotX)
    );

    camera.lookAt(0,30,0);
    renderer.render(scene,camera);
}
</script>
</body>
</html>
