<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケースモデラー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root{
  --bg:#0e0e10;--panel:#16161a;--panel2:#1e1e24;--border:#2a2a32;--border2:#3a3a46;
  --accent:#f0c040;--accent2:#c89a28;--text:#e8e8ec;--text2:#888896;--text3:#484858;
  --dc:#4a9eff;--danger:#ff5548;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

header{background:var(–panel);border-bottom:1px solid var(–border);height:52px;display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;}
.logo{font-family:‘IBM Plex Mono’,monospace;font-size:14px;font-weight:600;color:var(–accent);letter-spacing:.08em;}
.logo span{color:var(–text3);}
.hsep{width:1px;height:28px;background:var(–border);}
.type-bar{display:flex;gap:3px;background:var(–bg);padding:3px;border-radius:7px;border:1px solid var(–border);}
.type-btn{padding:5px 11px;border-radius:5px;border:none;background:transparent;color:var(–text2);cursor:pointer;font-size:12px;font-family:‘Noto Sans JP’,sans-serif;transition:all .15s;white-space:nowrap;}
.type-btn:hover{color:var(–text);}
.type-btn.active{background:var(–accent);color:#000;font-weight:600;}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(–border2);background:var(–panel2);color:var(–text);cursor:pointer;font-size:12px;font-family:‘Noto Sans JP’,sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(–accent);color:var(–accent);}
.btn.active{background:var(–accent);color:#000;border-color:var(–accent);font-weight:600;}

.main{display:flex;flex:1;overflow:hidden;}
.side{width:215px;flex-shrink:0;background:var(–panel);border-right:1px solid var(–border);display:flex;flex-direction:column;overflow-y:auto;}
.side::-webkit-scrollbar{width:3px;}
.side::-webkit-scrollbar-thumb{background:var(–border2);}
.sec{padding:13px;border-bottom:1px solid var(–border);}
.sec-title{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(–text3);margin-bottom:10px;font-family:‘IBM Plex Mono’,monospace;}
.field{margin-bottom:9px;}
.field label{display:block;font-size:11px;color:var(–text2);margin-bottom:3px;}
.nr{display:flex;align-items:center;gap:3px;}
.sb{width:26px;height:28px;background:var(–panel2);border:1px solid var(–border);border-radius:5px;color:var(–text);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s;}
.sb:hover{border-color:var(–accent);color:var(–accent);}
.nr input{flex:1;text-align:center;padding:5px 3px;background:var(–bg);border:1px solid var(–border);border-radius:5px;color:var(–text);font-size:12px;font-family:‘IBM Plex Mono’,monospace;outline:none;min-width:0;}
.nr input:focus{border-color:var(–accent);}
.unit{font-size:10px;color:var(–text3);font-family:‘IBM Plex Mono’,monospace;white-space:nowrap;}
.tr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tl{font-size:12px;color:var(–text2);}
.tog{position:relative;width:36px;height:20px;}
.tog input{opacity:0;width:0;height:0;}
.ts{position:absolute;inset:0;background:var(–border2);border-radius:20px;cursor:pointer;transition:.2s;}
.ts:before{content:’’;position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.tog input:checked+.ts{background:var(–accent);}
.tog input:checked+.ts:before{transform:translateX(16px);}
.rg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.ro{padding:4px 9px;border:1px solid var(–border);border-radius:4px;cursor:pointer;font-size:11px;color:var(–text2);transition:all .15s;background:var(–bg);}
.ro:hover{border-color:var(–accent);color:var(–text);}
.ro.active{border-color:var(–accent);color:var(–accent);background:rgba(240,192,64,.08);}
.hint{font-size:10px;color:var(–text3);line-height:1.5;margin-top:2px;}

.canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.cbar{background:var(–panel);border-bottom:1px solid var(–border);padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.bl{font-size:11px;color:var(–text3);font-family:‘IBM Plex Mono’,monospace;}
.bi{font-size:11px;color:var(–text2);font-family:‘IBM Plex Mono’,monospace;}
.cwrap{flex:1;overflow:hidden;position:relative;background:#06060e;}
canvas{display:block;}
.warn{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,85,72,.15);border:1px solid var(–danger);border-radius:6px;padding:6px 14px;font-size:11px;color:var(–danger);white-space:nowrap;pointer-events:none;display:none;z-index:50;}
.warn.on{display:block;}
.tip{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid var(–border2);border-radius:5px;padding:5px 14px;font-size:11px;color:var(–text2);font-family:‘IBM Plex Mono’,monospace;pointer-events:none;white-space:nowrap;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;}
.overlay.on{display:flex;}
.modal{background:var(–panel);border:1px solid var(–border2);border-radius:12px;padding:28px;width:360px;max-width:90vw;}
.modal h2{font-size:16px;font-family:‘IBM Plex Mono’,monospace;color:var(–accent);margin-bottom:18px;}
.mbtns{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
.mnote{font-size:11px;color:var(–text2);margin-top:10px;line-height:1.6;}
</style>

</head>
<body>
<header>
  <div class="logo">◈ CASE<span>/</span>MODELER</div>
  <div class="hsep"></div>
  <div class="type-bar">
    <button class="type-btn active" onclick="setType('case')" id="tb-case">ケース</button>
    <button class="type-btn" onclick="setType('case-fixed')" id="tb-case-fixed">仕切り固定</button>
    <button class="type-btn" onclick="setType('case-movable')" id="tb-case-movable">仕切り可動</button>
    <button class="type-btn" onclick="setType('drawer')" id="tb-drawer">引き出し</button>
    <button class="type-btn" onclick="setType('drawer-fixed')" id="tb-drawer-fixed">引き出し仕切り固定</button>
    <button class="type-btn" onclick="setType('drawer-movable')" id="tb-drawer-movable">引き出し仕切り可動</button>
  </div>
  <div class="hright">
    <button class="btn" id="btn3d" onclick="toggle3d()">◉ 3D確認</button>
    <button class="btn" onclick="openExport()">↓ エクスポート</button>
  </div>
</header>

<div class="main">
<div class="side">
  <div class="sec">
    <div class="sec-title">内寸</div>
    <div class="field"><label>幅 W</label><div class="nr"><button class="sb" onclick="step('iW',-1)">−</button><input type="number" id="iW" value="100" min="1" max="300" onchange="onChange()"><button class="sb" onclick="step('iW',1)">+</button><span class="unit">mm</span></div></div>
    <div class="field"><label>奥行 D</label><div class="nr"><button class="sb" onclick="step('iD',-1)">−</button><input type="number" id="iD" value="60" min="1" max="300" onchange="onChange()"><button class="sb" onclick="step('iD',1)">+</button><span class="unit">mm</span></div></div>
    <div class="field"><label>高さ H</label><div class="nr"><button class="sb" onclick="step('iH',-1)">−</button><input type="number" id="iH" value="40" min="1" max="300" onchange="onChange()"><button class="sb" onclick="step('iH',1)">+</button><span class="unit">mm</span></div></div>
  </div>
  <div class="sec">
    <div class="sec-title">壁・仕切り</div>
    <div class="field"><label>壁厚</label><div class="nr"><button class="sb" onclick="step('wT',-0.5)">−</button><input type="number" id="wT" value="2" min="1" max="20" step="0.5" onchange="onChange()"><button class="sb" onclick="step('wT',0.5)">+</button><span class="unit">mm</span></div></div>
    <div class="field" id="divTF"><label>仕切り厚</label><div class="nr"><button class="sb" onclick="step('dT',-0.5)">−</button><input type="number" id="dT" value="1.5" min="1" max="20" step="0.5" onchange="onChange()"><button class="sb" onclick="step('dT',0.5)">+</button><span class="unit">mm</span></div></div>
  </div>
  <div class="sec">
    <div class="sec-title">角丸め（外側）</div>
    <div class="tr"><span class="tl">有効</span><label class="tog"><input type="checkbox" id="useR" onchange="onRound()"><span class="ts"></span></label></div>
    <div class="field" id="rF" style="display:none"><label>半径</label><div class="nr"><button class="sb" onclick="step('rR',-0.5)">−</button><input type="number" id="rR" value="2" min="0.5" max="20" step="0.5" onchange="onChange()"><button class="sb" onclick="step('rR',0.5)">+</button><span class="unit">mm</span></div></div>
  </div>
  <div class="sec">
    <div class="sec-title">スタック</div>
    <div class="tr"><span class="tl">凸凹スタック</span><label class="tog"><input type="checkbox" id="useS" onchange="onChange()"><span class="ts"></span></label></div>
    <p class="hint">ONで底面に凸、天面に凹を追加</p>
  </div>
  <div class="sec" id="drawSec" style="display:none">
    <div class="sec-title">引き出しオプション</div>
    <div class="field"><label>背面</label><div class="rg"><div class="ro active" id="rb-open" onclick="setBack('open')">開放</div><div class="ro" id="rb-closed" onclick="setBack('closed')">埋める</div></div></div>
    <div class="field"><label>持ち手</label><div class="rg"><div class="ro active" id="rh-groove" onclick="setHandle('groove')">溝</div><div class="ro" id="rh-hole" onclick="setHandle('hole')">穴</div></div></div>
    <div id="gF">
      <div class="field"><label>溝：幅</label><div class="nr"><button class="sb" onclick="step('gW',-1)">−</button><input type="number" id="gW" value="40" min="5" max="200" onchange="onChange()"><button class="sb" onclick="step('gW',1)">+</button><span class="unit">mm</span></div></div>
      <div class="field"><label>溝：高さ</label><div class="nr"><button class="sb" onclick="step('gH',-1)">−</button><input type="number" id="gH" value="8" min="3" max="50" onchange="onChange()"><button class="sb" onclick="step('gH',1)">+</button><span class="unit">mm</span></div></div>
    </div>
    <div id="hF" style="display:none">
      <div class="field"><label>穴：直径</label><div class="nr"><button class="sb" onclick="step('hD',-1)">−</button><input type="number" id="hD" value="20" min="5" max="100" onchange="onChange()"><button class="sb" onclick="step('hD',1)">+</button><span class="unit">mm</span></div></div>
    </div>
  </div>
</div>

<div class="canvas-area">
  <div class="cbar">
    <span class="bl" id="mLbl">✏ 編集モード</span>
    <span style="color:var(--border2)">|</span>
    <span class="bi" id="dInfo">内寸 W:100 D:60 H:40mm</span>
    <span style="color:var(--border2)">|</span>
    <span class="bi" id="oInfo">外寸 W:104 D:64 H:44mm</span>
    <span class="bi" id="h3d" style="display:none;margin-left:auto;color:var(--text3)">ドラッグ回転 / ホイールズーム</span>
  </div>
  <div class="cwrap" id="cw">
    <canvas id="c2"></canvas>
    <canvas id="c3" style="display:none;cursor:grab;"></canvas>
    <div class="warn" id="wb">⚠ 仕切りが重なっています</div>
    <div class="tip" id="tipBox">クリックで縦仕切り追加 / Shift+クリックで横仕切り追加 | 仕切りをドラッグして移動</div>
  </div>
</div>
</div>

<div class="overlay" id="expOv">
  <div class="modal">
    <h2>↓ エクスポート</h2>
    <div class="field"><label>フォーマット</label><div class="rg"><div class="ro active" id="ef-stl" onclick="setFmt('stl')">STL</div><div class="ro" id="ef-obj" onclick="setFmt('obj')">OBJ</div></div></div>
    <p class="mnote" id="eNote"></p>
    <div class="mbtns"><button class="btn active" onclick="doExport()">ダウンロード</button><button class="btn" onclick="closeExp()">キャンセル</button></div>
  </div>
</div>

<script>
const S={type:'case',iW:100,iD:60,iH:40,wT:2,dT:1.5,useR:false,rR:2,useS:false,
  backType:'open',handleType:'groove',gW:40,gH:8,hD:20,
  xDiv:[],yDiv:[],selDiv:null,is3d:false,fmt:'stl'};
const HD=t=>['case-fixed','case-movable','drawer-fixed','drawer-movable'].includes(t);
const ID=t=>['drawer','drawer-fixed','drawer-movable'].includes(t);

let c2,ctx2,c3,ctx3,drag3=false,lm={x:0,y:0};
let rot={x:.42,y:.68},zoom=1,dragDiv=null;

window.addEventListener('load',()=>{
  c2=document.getElementById('c2'); ctx2=c2.getContext('2d');
  c3=document.getElementById('c3'); ctx3=c3.getContext('2d');
  resize(); window.addEventListener('resize',resize);
  c2.addEventListener('mousedown',m2Down);
  c2.addEventListener('mousemove',m2Move);
  c2.addEventListener('mouseup',m2Up);
  c2.addEventListener('mouseleave',m2Up);
  c3.addEventListener('mousedown',e=>{drag3=true;lm={x:e.clientX,y:e.clientY};c3.style.cursor='grabbing';});
  c3.addEventListener('mousemove',e=>{if(!drag3)return;rot.y+=(e.clientX-lm.x)*.012;rot.x+=(e.clientY-lm.y)*.012;lm={x:e.clientX,y:e.clientY};draw3();});
  c3.addEventListener('mouseup',()=>{drag3=false;c3.style.cursor='grab';});
  c3.addEventListener('mouseleave',()=>{drag3=false;c3.style.cursor='grab';});
  c3.addEventListener('wheel',e=>{zoom=Math.max(.3,Math.min(3,zoom-e.deltaY*.001));draw3();e.preventDefault();},{passive:false});
  onChange();
});

function resize(){
  const w=document.getElementById('cw');
  c2.width=c3.width=w.clientWidth; c2.height=c3.height=w.clientHeight; draw();
}

const g=id=>document.getElementById(id);
const gv=id=>parseFloat(g(id).value)||0;
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));

function step(id,d){const el=g(id);el.value=cl(parseFloat(el.value)+d,parseFloat(el.min||0),parseFloat(el.max||9999));onChange();}

function onChange(){
  S.iW=cl(gv('iW'),1,300);S.iD=cl(gv('iD'),1,300);S.iH=cl(gv('iH'),1,300);
  S.wT=cl(gv('wT'),1,20);S.dT=cl(gv('dT'),1,20);
  S.rR=cl(gv('rR'),.5,20);S.gW=cl(gv('gW'),5,200);S.gH=cl(gv('gH'),3,50);S.hD=cl(gv('hD'),5,100);
  S.useR=g('useR').checked;S.useS=g('useS').checked;
  clampDivs();checkOv();
  g('dInfo').textContent=`内寸 W:${S.iW} D:${S.iD} H:${S.iH}mm`;
  g('oInfo').textContent=`外寸 W:${S.iW+S.wT*2} D:${S.iD+S.wT*2} H:${S.iH+S.wT*2}mm`;
  draw();
}
function onRound(){g('rF').style.display=g('useR').checked?'block':'none';onChange();}
function setType(t){
  S.type=t;
  ['case','case-fixed','case-movable','drawer','drawer-fixed','drawer-movable'].forEach(k=>g('tb-'+k).classList.toggle('active',k===t));
  g('drawSec').style.display=ID(t)?'block':'none';
  g('divTF').style.display=HD(t)?'block':'none';
  const showTip=HD(t)&&!S.is3d;
  g('tipBox').style.display=showTip?'block':'none';
  if(!HD(t)){S.xDiv=[];S.yDiv=[];S.selDiv=null;}
  onChange();
}
function setBack(v){S.backType=v;['open','closed'].forEach(k=>g('rb-'+k).classList.toggle('active',k===v));onChange();}
function setHandle(v){S.handleType=v;['groove','hole'].forEach(k=>g('rh-'+k).classList.toggle('active',k===v));g('gF').style.display=v==='groove'?'block':'none';g('hF').style.display=v==='hole'?'block':'none';onChange();}
function toggle3d(){
  S.is3d=!S.is3d;
  c2.style.display=S.is3d?'none':'block';c3.style.display=S.is3d?'block':'none';
  g('btn3d').textContent=S.is3d?'✏ 編集に戻る':'◉ 3D確認';
  g('btn3d').classList.toggle('active',S.is3d);
  g('mLbl').textContent=S.is3d?'◉ 3D確認（編集不可）':'✏ 編集モード';
  g('h3d').style.display=S.is3d?'block':'none';
  g('tipBox').style.display=(HD(S.type)&&!S.is3d)?'block':'none';
  if(S.is3d){rot={x:.42,y:.68};zoom=1;draw3();}else draw2();
}
function setFmt(v){S.fmt=v;['stl','obj'].forEach(k=>g('ef-'+k).classList.toggle('active',k===v));}
function draw(){S.is3d?draw3():draw2();}

// ── Dividers ──
function addDiv(axis,pos){
  const arr=axis==='x'?S.xDiv:S.yDiv,mx=axis==='x'?S.iW:S.iD;
  arr.push(cl(Math.round(pos),1,mx-1));
  clampDivs();checkOv();draw2();
}
function clampDivs(){
  S.xDiv=S.xDiv.map(p=>cl(Math.round(p),1,S.iW-1));
  S.yDiv=S.yDiv.map(p=>cl(Math.round(p),1,S.iD-1));
}
function checkOv(){
  let w=false;
  const chk=(arr,mx)=>{const s=[...arr].sort((a,b)=>a-b);s.forEach(p=>{if(p<1||p>mx-1)w=true;});for(let i=0;i<s.length-1;i++)if(s[i+1]-s[i]<S.dT+1)w=true;};
  chk(S.xDiv,S.iW);chk(S.yDiv,S.iD);
  g('wb').classList.toggle('on',w);
}

// ── 2D ──
function getSc(){
  const W=c2.width-120,H=c2.height-100;
  const mW=S.iW+S.wT*2;
  const mH=ID(S.type)?(S.iH+S.wT*2)*1.4+S.iD+S.wT*2+32:S.iD+S.wT*2;
  return Math.min(W/mW,H/mH,5.5);
}
function rrect(c,x,y,w,h,r){
  r=Math.min(r||0,w/2,h/2);
  if(r<=0){c.rect(x,y,w,h);return;}
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

function draw2(){
  const c=ctx2,W=c2.width,H=c2.height;
  c.clearRect(0,0,W,H);c.fillStyle='#06060e';c.fillRect(0,0,W,H);
  drawGrid2(c,W,H);
  ID(S.type)?drawDrawer2(c,W,H):drawCase2(c,W,H);
}
function drawGrid2(c,W,H){c.strokeStyle='#0f0f1a';c.lineWidth=1;for(let x=0;x<W;x+=24){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}for(let y=0;y<H;y+=24){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}}

function getIO(){
  const s=getSc(),wt=S.wT,iW=S.iW,iD=S.iD,W=c2.width,H=c2.height;
  if(!ID(S.type)){
    const oW=(iW+wt*2)*s,oH=(iD+wt*2)*s;
    return{x:(W-oW)/2+wt*s,y:(H-oH)/2+wt*s,s};
  }else{
    const iH=S.iH,frontH=(iH+wt*2)*s,topH=(iD+wt*2)*s,gap=28;
    const total=frontH+gap+topH,startY=(H-total)/2;
    return{x:(W-(iW+wt*2)*s)/2+wt*s,y:startY+frontH+gap+wt*s,s};
  }
}

function drawCase2(c,W,H){
  const s=getSc(),iW=S.iW,iD=S.iD,wt=S.wT;
  const oW=(iW+wt*2)*s,oH=(iD+wt*2)*s;
  const ox=(W-oW)/2,oy=(H-oH)/2;
  const rr=S.useR?S.rR*s:0;
  c.fillStyle='#252534';rrect(c,ox,oy,oW,oH,rr);c.fill();
  c.strokeStyle='#484860';c.lineWidth=1.5;rrect(c,ox,oy,oW,oH,rr);c.stroke();
  c.fillStyle='#0a0a14';c.fillRect(ox+wt*s,oy+wt*s,iW*s,iD*s);
  c.strokeStyle='#202030';c.lineWidth=1;c.strokeRect(ox+wt*s,oy+wt*s,iW*s,iD*s);
  if(S.useS)stackNubs(c,ox,oy,oW,s);
  if(HD(S.type)){
    drawDivs(c,ox,oy,s,wt,iW,iD);
    drawSegs(c,ox,oy,s,wt,iW,iD);
    if(!S.xDiv.length&&!S.yDiv.length)drawHint(c,ox+wt*s,oy+wt*s,iW*s,iD*s);
  }
  dimL(c,ox,oy+oH+18,ox+oW,oy+oH+18,`W:${iW+wt*2}mm`);
  dimL(c,ox+oW+18,oy,ox+oW+18,oy+oH,`D:${iD+wt*2}mm`);
  c.fillStyle='#3a3a50';c.font='9px IBM Plex Mono';c.textAlign='left';c.textBaseline='bottom';
  c.fillText('TOP VIEW',ox,oy-6);
}

function drawDrawer2(c,W,H){
  const s=getSc(),iW=S.iW,iD=S.iD,iH=S.iH,wt=S.wT;
  const oW=(iW+wt*2)*s,frontH=(iH+wt*2)*s,topH=(iD+wt*2)*s,gap=28;
  const total=frontH+gap+topH,startY=(H-total)/2,ox=(W-oW)/2;
  const rr=S.useR?S.rR*s:0;
  // FRONT VIEW
  const fy=startY;
  c.fillStyle='#1a241a';rrect(c,ox,fy,oW,frontH,rr);c.fill();
  c.strokeStyle='#304830';c.lineWidth=1.5;rrect(c,ox,fy,oW,frontH,rr);c.stroke();
  c.fillStyle='#06060e';c.fillRect(ox+wt*s,fy+wt*s,iW*s,iH*s);
  c.strokeStyle='#142014';c.lineWidth=1;c.strokeRect(ox+wt*s,fy+wt*s,iW*s,iH*s);
  const hcy=fy+wt*s+iH*s*.82;
  if(S.handleType==='groove'){
    const gw=Math.min(S.gW,iW-4)*s,gh=S.gH*s,gx=ox+wt*s+(iW*s-gw)/2;
    c.fillStyle='#020206';c.fillRect(gx,hcy-gh/2,gw,gh);
    c.strokeStyle='#3a683a';c.lineWidth=1.5;c.strokeRect(gx,hcy-gh/2,gw,gh);
    c.fillStyle='#3a683a';c.font='9px IBM Plex Mono';c.textAlign='center';c.textBaseline='top';
    c.fillText(`溝 ${S.gW}×${S.gH}mm`,ox+wt*s+iW*s/2,hcy+gh/2+4);
  }else{
    const r=Math.min(S.hD/2,iW/4,iH/4)*s;
    c.beginPath();c.arc(ox+wt*s+iW*s/2,hcy,r,0,Math.PI*2);c.fillStyle='#020206';c.fill();c.strokeStyle='#3a683a';c.lineWidth=1.5;c.stroke();
    c.fillStyle='#3a683a';c.font='9px IBM Plex Mono';c.textAlign='center';c.textBaseline='top';c.fillText(`穴 ⌀${S.hD}mm`,ox+wt*s+iW*s/2,hcy+r+4);
  }
  if(S.useS)stackNubs(c,ox,fy,oW,s);
  c.fillStyle='#2a482a';c.font='9px IBM Plex Mono';c.textAlign='left';c.textBaseline='bottom';c.fillText('FRONT VIEW — 外枠正面',ox,fy-5);
  dimL(c,ox,fy+frontH+14,ox+oW,fy+frontH+14,`W:${iW+wt*2}mm`);
  dimL(c,ox+oW+14,fy,ox+oW+14,fy+frontH,`H:${iH+wt*2}mm`);
  // TOP VIEW
  const ty=startY+frontH+gap;
  c.fillStyle='#14182a';c.fillRect(ox,ty,oW,topH);c.strokeStyle='#283060';c.lineWidth=1.5;c.strokeRect(ox,ty,oW,topH);
  c.fillStyle='#06060e';c.fillRect(ox+wt*s,ty+wt*s,iW*s,iD*s);c.strokeStyle='#111428';c.lineWidth=1;c.strokeRect(ox+wt*s,ty+wt*s,iW*s,iD*s);
  if(HD(S.type)){
    drawDivs(c,ox,ty,s,wt,iW,iD);
    drawSegs(c,ox,ty,s,wt,iW,iD);
    if(!S.xDiv.length&&!S.yDiv.length)drawHint(c,ox+wt*s,ty+wt*s,iW*s,iD*s);
  }
  c.fillStyle='#283060';c.font='9px IBM Plex Mono';c.textAlign='left';c.textBaseline='bottom';c.fillText('TOP VIEW — 引き出し内部（上から）',ox,ty-5);
  dimL(c,ox,ty+topH+14,ox+oW,ty+topH+14,`W:${iW+wt*2}mm`);
  dimL(c,ox+oW+14,ty,ox+oW+14,ty+topH,`D:${iD+wt*2}mm`);
}

function drawDivs(c,ox,oy,s,wt,iW,iD){
  const iX=ox+wt*s,iY=oy+wt*s;
  S.xDiv.forEach((p,i)=>{
    const sel=S.selDiv&&S.selDiv.axis==='x'&&S.selDiv.idx===i;
    const dx=iX+p*s;
    c.fillStyle=sel?'rgba(74,158,255,.65)':'rgba(74,158,255,.3)';c.fillRect(dx-S.dT*s/2,iY,S.dT*s,iD*s);
    c.strokeStyle=sel?'#7ac8ff':'#3a80cc';c.lineWidth=sel?2:1;c.strokeRect(dx-S.dT*s/2,iY,S.dT*s,iD*s);
    c.fillStyle='#5ab0ff';c.font='9px IBM Plex Mono';c.textAlign='center';c.textBaseline='bottom';c.fillText(`${p}mm`,dx,iY-3);
    if(sel){arw(c,dx-10,iY+iD*s/2,'L','#7ac8ff');arw(c,dx+10,iY+iD*s/2,'R','#7ac8ff');}
  });
  S.yDiv.forEach((p,i)=>{
    const sel=S.selDiv&&S.selDiv.axis==='y'&&S.selDiv.idx===i;
    const dy=iY+p*s;
    c.fillStyle=sel?'rgba(74,158,255,.65)':'rgba(74,158,255,.3)';c.fillRect(iX,dy-S.dT*s/2,iW*s,S.dT*s);
    c.strokeStyle=sel?'#7ac8ff':'#3a80cc';c.lineWidth=sel?2:1;c.strokeRect(iX,dy-S.dT*s/2,iW*s,S.dT*s);
    c.fillStyle='#5ab0ff';c.font='9px IBM Plex Mono';c.textAlign='right';c.textBaseline='middle';c.fillText(`${p}mm`,iX-4,dy);
    if(sel){arw(c,iX+iW*s/2,dy-10,'U','#7ac8ff');arw(c,iX+iW*s/2,dy+10,'D','#7ac8ff');}
  });
}

function drawSegs(c,ox,oy,s,wt,iW,iD){
  const iX=ox+wt*s,iY=oy+wt*s;
  c.font='10px IBM Plex Mono';c.fillStyle='#445566';c.textBaseline='middle';
  const xs=[0,...[...S.xDiv].sort((a,b)=>a-b),iW];
  for(let i=0;i<xs.length-1;i++){
    const l=xs[i]+(i>0?S.dT/2:0),r=xs[i+1]-(i<xs.length-2?S.dT/2:0),seg=r-l;
    if(seg>5){c.textAlign='center';c.fillText(`${Math.round(seg)}`,iX+(l+seg/2)*s,iY+iD*s/2);}
  }
  const ys=[0,...[...S.yDiv].sort((a,b)=>a-b),iD];
  c.textAlign='left';
  for(let i=0;i<ys.length-1;i++){
    const t2=ys[i]+(i>0?S.dT/2:0),b=ys[i+1]-(i<ys.length-2?S.dT/2:0),seg=b-t2;
    if(seg>5){c.fillText(`${Math.round(seg)}`,iX+iW*s+4,iY+(t2+seg/2)*s);}
  }
}

function drawHint(c,ix,iy,iw,ih){
  c.fillStyle='rgba(74,158,255,.1)';c.fillRect(ix,iy,iw,ih);
  c.strokeStyle='rgba(74,158,255,.25)';c.lineWidth=1;c.setLineDash([4,4]);c.strokeRect(ix+2,iy+2,iw-4,ih-4);c.setLineDash([]);
}

function stackNubs(c,ox,oy,oW,s){
  const nw=7*s,nh=2.5*s,sp=18*s,cnt=Math.max(1,Math.floor(oW/sp)-1),sx=ox+(oW-(cnt-1)*sp)/2;
  c.fillStyle='#363646';c.strokeStyle='#505060';c.lineWidth=1;
  for(let i=0;i<cnt;i++){c.fillRect(sx+i*sp-nw/2,oy-nh,nw,nh);c.strokeRect(sx+i*sp-nw/2,oy-nh,nw,nh);}
}
function arw(c,x,y,d,col){
  c.fillStyle=col;c.beginPath();
  if(d==='L'){c.moveTo(x-7,y);c.lineTo(x,y-4);c.lineTo(x,y+4);}
  else if(d==='R'){c.moveTo(x+7,y);c.lineTo(x,y-4);c.lineTo(x,y+4);}
  else if(d==='U'){c.moveTo(x,y-7);c.lineTo(x-4,y);c.lineTo(x+4,y);}
  else{c.moveTo(x,y+7);c.lineTo(x-4,y);c.lineTo(x+4,y);}
  c.closePath();c.fill();
}
function dimL(c,x1,y1,x2,y2,txt){
  c.strokeStyle='#2a2a3c';c.lineWidth=1;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
  c.fillStyle='#4a4a60';c.font='10px IBM Plex Mono';c.textAlign='center';c.textBaseline='middle';
  c.fillText(txt,(x1+x2)/2+(y1===y2?0:12),(y1+y2)/2+(y1===y2?-7:0));
}

// ── Mouse ──
function cXY(e){const r=c2.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function hitTest(mx,my){
  const{x:iX,y:iY,s}=getIO(),HIT=9;
  for(let i=0;i<S.xDiv.length;i++){if(Math.abs(mx-(iX+S.xDiv[i]*s))<HIT&&my>=iY&&my<=iY+S.iD*s)return{axis:'x',idx:i};}
  for(let i=0;i<S.yDiv.length;i++){if(Math.abs(my-(iY+S.yDiv[i]*s))<HIT&&mx>=iX&&mx<=iX+S.iW*s)return{axis:'y',idx:i};}
  return null;
}
function insideInner(mx,my){
  const{x:iX,y:iY,s}=getIO();
  return mx>=iX&&mx<=iX+S.iW*s&&my>=iY&&my<=iY+S.iD*s;
}
function m2Down(e){
  if(S.is3d||!HD(S.type))return;
  const{x,y}=cXY(e);
  const hit=hitTest(x,y);
  if(hit){dragDiv=hit;S.selDiv=hit;c2.style.cursor=hit.axis==='x'?'ew-resize':'ns-resize';draw2();}
  else if(insideInner(x,y)){
    const{x:iX,y:iY,s}=getIO();
    if(e.shiftKey){addDiv('y',(y-iY)/s);S.selDiv={axis:'y',idx:S.yDiv.length-1};}
    else{addDiv('x',(x-iX)/s);S.selDiv={axis:'x',idx:S.xDiv.length-1};}
    dragDiv=S.selDiv;
    c2.style.cursor=S.selDiv.axis==='x'?'ew-resize':'ns-resize';
    draw2();
  }else{S.selDiv=null;draw2();}
}
function m2Move(e){
  if(S.is3d)return;
  const{x,y}=cXY(e);
  if(!dragDiv){
    if(HD(S.type)){
      const hit=hitTest(x,y);
      c2.style.cursor=hit?(hit.axis==='x'?'ew-resize':'ns-resize'):(insideInner(x,y)?'crosshair':'default');
    }
    return;
  }
  const{x:iX,y:iY,s}=getIO();
  if(dragDiv.axis==='x'){S.xDiv[dragDiv.idx]=cl(Math.round((x-iX)/s),1,S.iW-1);}
  else{S.yDiv[dragDiv.idx]=cl(Math.round((y-iY)/s),1,S.iD-1);}
  checkOv();draw2();
}
function m2Up(){if(dragDiv){dragDiv=null;c2.style.cursor='default';checkOv();draw2();}}

// ── 3D ──
function draw3(){
  const c=ctx3,W=c3.width,H=c3.height;
  c.clearRect(0,0,W,H);c.fillStyle='#04040c';c.fillRect(0,0,W,H);
  grid3(c,W,H);
  ID(S.type)?d3Drawer(c,W,H):d3Case(c,W,H);
}
function proj3(x,y,z,W,H){
  const cy=Math.cos(rot.y),sy=Math.sin(rot.y),cx=Math.cos(rot.x),sx=Math.sin(rot.x);
  const rx=x*cy+z*sy,rz=-x*sy+z*cy,ry2=y*cx-rz*sx,rz2=y*sx+rz*cx;
  const fov=560*zoom,pz=rz2+600;
  return{x:rx*fov/pz+W/2,y:-ry2*fov/pz+H/2,z:rz2};
}
function grid3(c,W,H){
  c.strokeStyle='#0c0c18';c.lineWidth=1;
  for(let i=-160;i<=160;i+=26){
    const a=proj3(i,-88,-160,W,H),b=proj3(i,-88,160,W,H);
    const d=proj3(-160,-88,i,W,H),e=proj3(160,-88,i,W,H);
    c.beginPath();c.moveTo(a.x,a.y);c.lineTo(b.x,b.y);c.stroke();
    c.beginPath();c.moveTo(d.x,d.y);c.lineTo(e.x,e.y);c.stroke();
  }
}
function b3(c,W,H,x,y,z,bw,bh,bd,cols,edge){
  const vs=[[x,y,z],[x+bw,y,z],[x+bw,y+bh,z],[x,y+bh,z],[x,y,z+bd],[x+bw,y,z+bd],[x+bw,y+bh,z+bd],[x,y+bh,z+bd]].map(([px,py,pz])=>proj3(px,py,pz,W,H));
  const fs=[[4,5,6,7,cols[0]],[0,3,2,1,cols[1]],[0,4,7,3,cols[2]],[1,2,6,5,cols[3]],[3,7,6,2,cols[4]],[0,1,5,4,cols[5]]].map(([a,b2,c2,d,col])=>({pts:[vs[a],vs[b2],vs[c2],vs[d]],col,z:(vs[a].z+vs[b2].z+vs[c2].z+vs[d].z)/4})).sort((a,b2)=>b2.z-a.z);
  fs.forEach(({pts,col})=>{c.beginPath();c.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>c.lineTo(p.x,p.y));c.closePath();c.fillStyle=col;c.fill();c.strokeStyle=edge;c.lineWidth=.8;c.stroke();});
}
function d3Case(c,W,H){
  const iW=S.iW,iD=S.iD,iH=S.iH,wt=S.wT,sc=Math.min(175/Math.max(iW,iD,iH),2.5);
  const sw=iW*sc,sd=iD*sc,sh=iH*sc,ws=wt*sc;
  const cx=-(sw+ws*2)/2,cy=-(sh+ws*2)/2,cz=-(sd+ws*2)/2;
  const GC=['#2c2c3e','#222232','#282838','#282838','#343448','#1c1c2c'];
  b3(c,W,H,cx,cy,cz,sw+ws*2,ws,sd+ws*2,GC,'#404058');
  b3(c,W,H,cx,cy+ws,cz,sw+ws*2,sh,ws,GC,'#404058');
  b3(c,W,H,cx,cy+ws,cz+sd+ws,sw+ws*2,sh,ws,GC,'#404058');
  b3(c,W,H,cx,cy+ws,cz+ws,ws,sh,sd,GC,'#404058');
  b3(c,W,H,cx+sw+ws,cy+ws,cz+ws,ws,sh,sd,GC,'#404058');
  b3(c,W,H,cx,cy+sh+ws,cz,sw+ws*2,ws,sd+ws*2,['#383848','#2c2c3c','#343444','#343444','#424254','#242434'],'#505068');
  if(HD(S.type)){
    const DC=['#1a4472','#122e58','#163864','#163864','#1e5080','#0e2244'];
    S.xDiv.forEach(p=>{b3(c,W,H,cx+ws+p*sc-S.dT*sc/2,cy+ws,cz+ws,S.dT*sc,sh,sd,DC,'#2255a8');});
    S.yDiv.forEach(p=>{b3(c,W,H,cx+ws,cy+ws,cz+ws+p*sc-S.dT*sc/2,sw,sh,S.dT*sc,DC,'#2255a8');});
  }
  if(S.useS){const nw=7*sc,nh=2.5*sc,cnt=Math.max(1,Math.floor((sw+ws*2)/18)-1),snx=cx+((sw+ws*2)-(cnt-1)*18*sc)/2;for(let i=0;i<cnt;i++)b3(c,W,H,snx+i*18*sc-nw/2,cy+sh+ws*2,cz+(sd+ws*2)*.35,nw,nh,nw,['#404050','#303040','#383848','#383848','#484858','#282838'],'#505060');}
}
function d3Drawer(c,W,H){
  const iW=S.iW,iD=S.iD,iH=S.iH,wt=S.wT,sc=Math.min(155/Math.max(iW,iD,iH),2.5);
  const sw=iW*sc,sd=iD*sc,sh=iH*sc,ws=wt*sc,ow=sw+ws*2,oh=sh+ws*2,od=sd+ws*2;
  const ocx=-ow/2,ocy=-oh/2,ocz=-od/2;
  const OC=['#162416','#0e180e','#122012','#122012','#1c2e1c','#0a0e0a'];
  b3(c,W,H,ocx,ocy,ocz,ow,ws,od,OC,'#244824');
  b3(c,W,H,ocx,ocy+ws,ocz,ow,sh,ws,OC,'#244824');
  b3(c,W,H,ocx,ocy+ws,ocz+ws,ws,sh,sd,OC,'#244824');
  b3(c,W,H,ocx+sw+ws,ocy+ws,ocz+ws,ws,sh,sd,OC,'#244824');
  if(S.backType==='closed')b3(c,W,H,ocx,ocy+ws,ocz+sd+ws,ow,sh,ws,OC,'#244824');
  b3(c,W,H,ocx,ocy+sh+ws,ocz,ow,ws,od,['#1e341e','#162814','#1c2e1c','#1c2e1c','#263c26','#101e10'],'#2c542c');
  const pull=14*sc,dx=ocx+ws,dy=ocy+ws,dz=ocz+ws-pull;
  const IC=['#342a18','#281e12','#2e2414','#2e2414','#3c3220','#1e180e'];
  b3(c,W,H,dx,dy,dz,sw,ws,sd,IC,'#5a4a30');
  b3(c,W,H,dx,dy+ws,dz,sw,sh-ws,ws,IC,'#5a4a30');
  b3(c,W,H,dx,dy+ws,dz+ws,ws,sh-ws,sd-ws,IC,'#5a4a30');
  b3(c,W,H,dx+sw-ws,dy+ws,dz+ws,ws,sh-ws,sd-ws,IC,'#5a4a30');
  if(HD(S.type)){
    const DC=['#1a4472','#122e58','#163864','#163864','#1e5080','#0e2244'];
    S.xDiv.forEach(p=>{b3(c,W,H,dx+ws+p*sc-S.dT*sc/2,dy+ws,dz+ws,S.dT*sc,sh-ws,sd-ws,DC,'#2255a8');});
    S.yDiv.forEach(p=>{b3(c,W,H,dx+ws,dy+ws,dz+ws+p*sc-S.dT*sc/2,sw-ws*2,sh-ws,S.dT*sc,DC,'#2255a8');});
  }
}

// ── Export ──
function openExport(){
  g('expOv').classList.add('on');
  const n={'case':'1ファイル（ケース一体型）','case-fixed':'1ファイル（仕切り含む一体型）','case-movable':'ZIP：ケース本体 + 仕切り（別ファイル）','drawer':'ZIP：外枠 + 引き出し','drawer-fixed':'ZIP：外枠 + 引き出し（仕切り一体）','drawer-movable':'ZIP：外枠 + 引き出し + 仕切り（別ファイル）'};
  g('eNote').textContent='出力形式：'+n[S.type];
}
function closeExp(){g('expOv').classList.remove('on');}
function doExport(){
  const fmt=S.fmt;
  if(['case','case-fixed'].includes(S.type)){
    const t=bCase();dl(toSTL_or_OBJ(t,fmt,'model'),`case.${fmt}`);
  }else zipExp(fmt);
  closeExp();
}
function bCase(){
  const wt=S.wT,iW=S.iW,iD=S.iD,iH=S.iH;
  let t=bTri(0,0,0,iW+wt*2,iH+wt*2,iD+wt*2);
  if(S.type==='case-fixed'){
    S.xDiv.forEach(p=>t=[...t,...bTri(wt+p-S.dT/2,wt,wt,S.dT,iH,iD)]);
    S.yDiv.forEach(p=>t=[...t,...bTri(wt,wt,wt+p-S.dT/2,iW,iH,S.dT)]);
  }
  return t;
}
function bTri(x,y,z,w,h,d){
  const v=[[x,y,z],[x+w,y,z],[x+w,y+h,z],[x,y+h,z],[x,y,z+d],[x+w,y,z+d],[x+w,y+h,z+d],[x,y+h,z+d]];
  return[{v:[v[0],v[2],v[1]],n:[0,0,-1]},{v:[v[0],v[3],v[2]],n:[0,0,-1]},{v:[v[4],v[5],v[6]],n:[0,0,1]},{v:[v[4],v[6],v[7]],n:[0,0,1]},{v:[v[0],v[4],v[7]],n:[-1,0,0]},{v:[v[0],v[7],v[3]],n:[-1,0,0]},{v:[v[1],v[2],v[6]],n:[1,0,0]},{v:[v[1],v[6],v[5]],n:[1,0,0]},{v:[v[0],v[1],v[5]],n:[0,-1,0]},{v:[v[0],v[5],v[4]],n:[0,-1,0]},{v:[v[3],v[7],v[6]],n:[0,1,0]},{v:[v[3],v[6],v[2]],n:[0,1,0]}];
}
function toSTL_or_OBJ(tris,fmt,name){return fmt==='stl'?toSTL(tris,name):toOBJ(tris,name);}
function toSTL(t,nm){
  let s=`solid ${nm}\n`;
  t.forEach(f=>{s+=`  facet normal ${f.n.join(' ')}\n    outer loop\n`;f.v.forEach(v=>s+=`      vertex ${v.join(' ')}\n`);s+=`    endloop\n  endfacet\n`;});
  return s+`endsolid ${nm}\n`;
}
function toOBJ(t,nm){
  const vs=[],vm={};const av=v=>{const k=v.join(',');if(vm[k]==null){vs.push(v);vm[k]=vs.length;}return vm[k];};
  const fs=t.map(f=>f.v.map(av));
  return`# ${nm}\n`+vs.map(v=>`v ${v.join(' ')}`).join('\n')+'\n'+fs.map(f=>`f ${f.join(' ')}`).join('\n')+'\n';
}
function dl(content,fname){const b=new Blob([content],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fname;a.click();}
async function zipExp(fmt){
  const wt=S.wT,iW=S.iW,iD=S.iD,iH=S.iH,files={};
  const enc=s=>toSTL_or_OBJ(s,fmt,'part');
  if(S.type==='case-movable'){
    files[`case.${fmt}`]=enc(bTri(0,0,0,iW+wt*2,iH+wt*2,iD+wt*2));
    S.xDiv.forEach((p,i)=>files[`divider_x${i+1}.${fmt}`]=enc(bTri(wt+p-S.dT/2,wt,wt,S.dT,iH,iD)));
    S.yDiv.forEach((p,i)=>files[`divider_y${i+1}.${fmt}`]=enc(bTri(wt,wt,wt+p-S.dT/2,iW,iH,S.dT)));
  }else{
    let outer=bTri(0,0,0,iW+wt*2,iH+wt*2,iD+wt*2);
    let inner=[...bTri(0,0,0,iW+wt*2,wt,iD+wt*2),...bTri(0,wt,0,iW+wt*2,iH,wt),...bTri(0,wt,wt,wt,iH,iD),...bTri(iW+wt,wt,wt,wt,iH,iD)];
    if(S.backType==='closed')inner=[...inner,...bTri(0,wt,iD+wt,iW+wt*2,iH,wt)];
    if(S.type==='drawer-fixed'){
      S.xDiv.forEach(p=>inner=[...inner,...bTri(wt+p-S.dT/2,wt,wt,S.dT,iH,iD)]);
      S.yDiv.forEach(p=>inner=[...inner,...bTri(wt,wt,wt+p-S.dT/2,iW,iH,S.dT)]);
    }
    files[`outer.${fmt}`]=enc(outer);
    files[`drawer.${fmt}`]=enc(inner);
    if(S.type==='drawer-movable'){
      S.xDiv.forEach((p,i)=>files[`divider_x${i+1}.${fmt}`]=enc(bTri(wt+p-S.dT/2,wt,wt,S.dT,iH,iD)));
      S.yDiv.forEach((p,i)=>files[`divider_y${i+1}.${fmt}`]=enc(bTri(wt,wt,wt+p-S.dT/2,iW,iH,S.dT)));
    }
  }
  const blob=await mkZip(files);const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`model_${S.type}.zip`;a.click();
}
async function mkZip(files){
  const enc=new TextEncoder(),entries=[];let off=0;
  for(const[name,content]of Object.entries(files)){
    const data=enc.encode(content),nb=enc.encode(name),crc=crc32c(data),lh=lHdr(nb,data.length,crc);
    entries.push({lh,data,nb,off,crc});off+=lh.length+data.length;
  }
  const cd=mrg(entries.map(e=>cHdr(e.nb,e.data.length,e.crc,e.off)));
  return new Blob([mrg([...entries.map(e=>mrg([e.lh,e.data])),cd,eocd(entries.length,cd.length,off)])],{type:'application/zip'});
}
function lHdr(n,sz,crc){const b=new ArrayBuffer(30+n.length),v=new DataView(b);v.setUint32(0,0x04034b50,true);v.setUint16(4,20,true);[6,8,10,12].forEach(i=>v.setUint16(i,0,true));v.setUint32(14,crc,true);v.setUint32(18,sz,true);v.setUint32(22,sz,true);v.setUint16(26,n.length,true);v.setUint16(28,0,true);new Uint8Array(b).set(n,30);return new Uint8Array(b);}
function cHdr(n,sz,crc,o){const b=new ArrayBuffer(46+n.length),v=new DataView(b);v.setUint32(0,0x02014b50,true);v.setUint16(4,20,true);v.setUint16(6,20,true);[8,10,12,14].forEach(i=>v.setUint16(i,0,true));v.setUint32(16,crc,true);v.setUint32(20,sz,true);v.setUint32(24,sz,true);[28,30,32,34,36].forEach(i=>v.setUint16(i,0,true));v.setUint32(38,0,true);v.setUint32(42,o,true);new Uint8Array(b).set(n,46);return new Uint8Array(b);}
function eocd(cnt,cdsz,cdoff){const b=new ArrayBuffer(22),v=new DataView(b);v.setUint32(0,0x06054b50,true);v.setUint16(4,0,true);v.setUint16(6,0,true);v.setUint16(8,cnt,true);v.setUint16(10,cnt,true);v.setUint32(12,cdsz,true);v.setUint32(16,cdoff,true);v.setUint16(20,0,true);return new Uint8Array(b);}
function mrg(bufs){const t=bufs.reduce((s,b)=>s+b.length,0),o=new Uint8Array(t);let p=0;bufs.forEach(b=>{o.set(b,p);p+=b.length;});return o;}
function crc32c(d){let c=0xFFFFFFFF;for(let i=0;i<d.length;i++){c^=d[i];for(let j=0;j<8;j++)c=(c>>>1)^(0xEDB88320&-(c&1));}return(c^0xFFFFFFFF)>>>0;}
