<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Storage Designer Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; background: #2c3e50; }
        #sidebar { width: 300px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 10; overflow-y: auto; }
        #viewer { flex: 1; position: relative; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .info { background: #f0f3f5; padding: 10px; border-radius: 4px; font-size: 12px; border-left: 4px solid #e67e22; }
        .hint { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; pointer-events: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Design Logic</h3>
    <div class="input-group">
        <label>引出し内寸 (W / D / H)</label>
        <div style="display:flex; gap:5px;">
            <input type="number" id="w" value="100">
            <input type="number" id="d" value="120">
            <input type="number" id="h" value="40">
        </div>
    </div>
    <div class="input-group">
        <label>肉厚 (引出し / 外枠)</label>
        <div style="display:flex; gap:5px;">
            <input type="number" id="tt" value="2.0" step="0.1">
            <input type="number" id="ts" value="2.5" step="0.1">
        </div>
    </div>
    <div class="input-group">
        <label>遊び (Gap mm)</label>
        <input type="number" id="gap" value="1.0" step="0.1">
    </div>
    <div class="info" id="stats">外枠外寸: 計算中...</div>
</div>

<div id="viewer">
    <div class="hint">マウスドラッグ: 回転 / ホイール: ズーム / 右クリック: 平行移動</div>
</div>

<script>
let scene, camera, renderer, tray, shell;
let mouse = new THREE.Vector2(), isDragging = false;
let rotX = -0.5, rotY = 0.5, zoom = 400;

window.onload = init;

function init() {
    // Scene Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x34495e);
    
    const container = document.getElementById('viewer');
    camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 5000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Light
    const ambient = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 0.5);
    sun.position.set(1, 1, 1);
    scene.add(sun);

    // Groups
    tray = new THREE.Group();
    shell = new THREE.Group();
    scene.add(tray);
    scene.add(shell);

    // Controls (Manual Implementation for stability)
    let lastX, lastY;
    container.onmousedown = (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        rotY += (e.clientX - lastX) * 0.01;
        rotX += (e.clientY - lastY) * 0.01;
        lastX = e.clientX; lastY = e.clientY;
    };
    window.onmouseup = () => isDragging = false;
    container.onwheel = (e) => { zoom += e.deltaY * 0.5; zoom = Math.max(100, zoom); };

    // Events
    document.querySelectorAll('input').forEach(el => el.oninput = build);
    window.onresize = () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    };

    build();
    animate();
}

function build() {
    const w = parseFloat(document.getElementById('w').value);
    const d = parseFloat(document.getElementById('d').value);
    const h = parseFloat(document.getElementById('h').value);
    const tt = parseFloat(document.getElementById('tt').value);
    const ts = parseFloat(document.getElementById('ts').value);
    const gap = parseFloat(document.getElementById('gap').value);

    tray.clear();
    shell.clear();

    const trayMat = new THREE.MeshPhongMaterial({ color: 0x3498db });
    const shellMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });

    // 1. Tray Calculation
    const tw = w + tt * 2;
    const td = d + tt * 2;
    const th = h + tt;

    const floor = new THREE.Mesh(new THREE.BoxGeometry(tw, tt, td), trayMat);
    floor.position.y = tt/2;
    tray.add(floor);

    const walls = [
        [tt, h, td, -(w/2+tt/2), h/2+tt, 0], // Left
        [tt, h, td, (w/2+tt/2), h/2+tt, 0],  // Right
        [w, h, tt, 0, h/2+tt, -(d/2+tt/2)], // Back
        [w, h, tt, 0, h/2+tt, (d/2+tt/2)]   // Front
    ];
    walls.forEach(dat => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(dat[0], dat[1], dat[2]), trayMat);
        m.position.set(dat[3], dat[4], dat[5]);
        tray.add(m);
    });

    // 2. Shell Calculation (Inside-Out)
    const sw_in = tw + gap * 2;
    const sd_in = td + gap;
    const sh_in = th + gap;

    const sw_out = sw_in + ts * 2;
    const sd_out = sd_in + ts;
    const sh_out = sh_in + ts * 2;

    const sParts = [
        [ts, sh_out, sd_out, -(sw_in/2+ts/2), sh_out/2, -ts/2], // L
        [ts, sh_out, sd_out, (sw_in/2+ts/2), sh_out/2, -ts/2],  // R
        [sw_out, ts, sd_out, 0, ts/2, -ts/2],                  // Bottom
        [sw_out, ts, sd_out, 0, sh_out - ts/2, -ts/2],         // Top
        [sw_in, sh_in, ts, 0, sh_out/2, -(sd_in/2+ts/2)]       // Back
    ];
    sParts.forEach(dat => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(dat[0], dat[1], dat[2]), shellMat);
        m.position.set(dat[3], dat[4], dat[5]);
        shell.add(m);
    });

    // Layout
    tray.position.x = -sw_out * 0.6;
    shell.position.x = sw_out * 0.6;

    document.getElementById('stats').innerText = `外枠外寸: ${sw_out.toFixed(1)} x ${sd_out.toFixed(1)} x ${sh_out.toFixed(1)} mm`;
}

function animate() {
    requestAnimationFrame(animate);
    camera.position.x = zoom * Math.sin(rotY) * Math.cos(rotX);
    camera.position.y = zoom * Math.sin(rotX);
    camera.position.z = zoom * Math.cos(rotY) * Math.cos(rotX);
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
}
</script>
</body>
</html>
