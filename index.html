<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケースモデラー</title>
<style>
:root{
  --bg:#0e0e10;--panel:#16161a;--p2:#1e1e24;--bd:#2a2a32;--bd2:#3a3a46;
  --ac:#f0c040;--tx:#e8e8ec;--t2:#888896;--t3:#484858;
  --dc:#4a9eff;--dn:#ff5548;
}
html,body{height:100%;margin:0;padding:0;}
*{box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
#hdr{background:var(--panel);border-bottom:1px solid var(--bd);height:48px;min-height:48px;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;}
.logo{font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:var(--ac);white-space:nowrap;}
.sep{width:1px;height:22px;background:var(--bd);flex-shrink:0;}
.tbar{display:flex;gap:2px;background:var(--bg);padding:2px;border-radius:6px;border:1px solid var(--bd);overflow-x:auto;flex-shrink:1;min-width:0;}
.tbar::-webkit-scrollbar{height:0;}
.tb{padding:4px 8px;border-radius:4px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:11px;white-space:nowrap;transition:all .15s;}
.tb:hover{color:var(--tx);}
.tb.on{background:var(--ac);color:#000;font-weight:700;}
.hr{margin-left:auto;display:flex;gap:5px;flex-shrink:0;}
.btn{padding:5px 10px;border-radius:5px;border:1px solid var(--bd2);background:var(--p2);color:var(--tx);cursor:pointer;font-size:11px;white-space:nowrap;transition:all .15s;}
.btn:hover{border-color:var(--ac);color:var(--ac);}
.btn.hi{background:var(--ac);color:#000;border-color:var(--ac);font-weight:700;}
#main{display:flex;flex:1;min-height:0;overflow:hidden;}
#lp,#rp{background:var(--panel);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;flex-shrink:0;}
#lp{width:202px;border-right:1px solid var(--bd);}
#rp{width:194px;border-left:1px solid var(--bd);}
#lp::-webkit-scrollbar,#rp::-webkit-scrollbar{width:3px;}
#lp::-webkit-scrollbar-thumb,#rp::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.sec{padding:10px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.st{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;font-family:'Courier New',monospace;}
.f{margin-bottom:7px;}
.f label{display:block;font-size:11px;color:var(--t2);margin-bottom:2px;}
.nr{display:flex;align-items:center;gap:2px;}
.sb{width:22px;height:24px;background:var(--p2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;line-height:1;transition:all .1s;}
.sb:hover{border-color:var(--ac);color:var(--ac);}
.nr input[type=number]{flex:1;text-align:center;padding:3px 1px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:11px;font-family:'Courier New',monospace;outline:none;min-width:0;}
.nr input[type=number]:focus{border-color:var(--ac);}
.unit{font-size:9px;color:var(--t3);font-family:'Courier New',monospace;margin-left:2px;white-space:nowrap;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tog-label{font-size:11px;color:var(--t2);}
.tog{width:32px;height:18px;background:var(--bd2);border-radius:9px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--ac);}
.tog-knob{position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;}
.tog.on .tog-knob{left:17px;}
.rg{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px;}
.ro{padding:3px 7px;border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:11px;color:var(--t2);background:var(--bg);transition:all .15s;}
.ro:hover{border-color:var(--ac);color:var(--tx);}
.ro.on{border-color:var(--ac);color:var(--ac);background:rgba(240,192,64,.1);}
.hint{font-size:10px;color:var(--t3);line-height:1.5;margin-top:2px;}
#ca{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0;}
#cbar{background:var(--panel);border-bottom:1px solid var(--bd);padding:5px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.bl{font-size:10px;color:var(--t3);font-family:'Courier New',monospace;white-space:nowrap;}
.bi{font-size:10px;color:var(--t2);font-family:'Courier New',monospace;white-space:nowrap;}
#cw{flex:1;overflow:hidden;position:relative;background:#05050d;min-height:0;}
canvas{display:block;}
#wb{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(255,85,72,.15);border:1px solid var(--dn);border-radius:5px;padding:4px 12px;font-size:11px;color:var(--dn);white-space:nowrap;pointer-events:none;display:none;z-index:50;}
#wb.on{display:block;}
#ctip{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);border:1px solid var(--bd2);border-radius:4px;padding:3px 10px;font-size:10px;color:var(--t2);font-family:'Courier New',monospace;pointer-events:none;white-space:nowrap;display:none;}
.rst{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);font-family:'Courier New',monospace;padding:8px 10px 5px;border-bottom:1px solid var(--bd);flex-shrink:0;}
#stageTabs{display:none;gap:2px;flex-wrap:wrap;padding:5px 7px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.stage-tab{padding:3px 7px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--t2);cursor:pointer;font-size:10px;font-family:'Courier New',monospace;transition:all .15s;}
.stage-tab:hover{border-color:var(--dc);color:var(--dc);}
.stage-tab.on{border-color:var(--dc);background:rgba(74,158,255,.15);color:var(--dc);}
#rpbody{padding:8px;flex:1;overflow-y:auto;min-height:0;}
#rpbody::-webkit-scrollbar{width:3px;}
#rpbody::-webkit-scrollbar-thumb{background:var(--bd2);}
#selBox{background:rgba(74,158,255,.07);border:1px solid var(--dc);border-radius:4px;padding:7px;margin-bottom:7px;display:none;}
#selBox.on{display:block;}
.sbt{font-size:9px;color:var(--dc);margin-bottom:5px;font-family:'Courier New',monospace;}
.dat{font-size:9px;color:var(--t3);font-family:'Courier New',monospace;margin-bottom:4px;}
.dl{display:flex;flex-direction:column;gap:3px;margin-bottom:3px;}
.di{display:flex;align-items:center;gap:4px;padding:4px 5px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;cursor:pointer;transition:all .15s;}
.di:hover{border-color:var(--dc);}
.di.on{border-color:var(--dc);background:rgba(74,158,255,.1);}
.dil{font-size:10px;font-family:'Courier New',monospace;color:var(--t2);flex:1;}
.dip{font-size:10px;font-family:'Courier New',monospace;color:var(--dc);}
.did{background:none;border:none;color:var(--t3);cursor:pointer;padding:1px 3px;font-size:11px;line-height:1;}
.did:hover{color:var(--dn);}
.addbtn{width:100%;padding:4px;background:transparent;border:1px dashed var(--bd);border-radius:4px;color:var(--t3);cursor:pointer;font-size:10px;transition:all .15s;margin-top:2px;}
.addbtn:hover{border-color:var(--dc);color:var(--dc);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;}
.ov.on{display:flex;}
.modal{background:var(--panel);border:1px solid var(--bd2);border-radius:10px;padding:22px;width:340px;max-width:92vw;}
.modal h2{font-size:14px;font-family:'Courier New',monospace;color:var(--ac);margin-bottom:14px;}
.mbtns{display:flex;gap:7px;margin-top:14px;}
.mnote{font-size:11px;color:var(--t2);margin-top:7px;line-height:1.6;}
</style>
</head>
<body>
<div id="hdr">
  <div class="logo">◈ CASE/MODELER</div>
  <div class="sep"></div>
  <div class="tbar">
    <button class="tb on" id="tb-case" onclick="setType('case')">ケース</button>
    <button class="tb" id="tb-case-fixed" onclick="setType('case-fixed')">仕切り固定</button>
    <button class="tb" id="tb-case-movable" onclick="setType('case-movable')">仕切り可動</button>
    <button class="tb" id="tb-drawer" onclick="setType('drawer')">引き出し</button>
    <button class="tb" id="tb-drawer-fixed" onclick="setType('drawer-fixed')">引き出し仕切り固定</button>
    <button class="tb" id="tb-drawer-movable" onclick="setType('drawer-movable')">引き出し仕切り可動</button>
  </div>
  <div class="hr">
    <button class="btn" id="btn3d" onclick="toggle3d()">◉ 3D確認</button>
    <button class="btn" onclick="openExp()">↓ エクスポート</button>
  </div>
</div>

<div id="main">
<div id="lp">
  <div class="sec">
    <div class="st">内寸</div>
    <div class="f"><label>幅 W</label><div class="nr"><button class="sb" onclick="step('iW',-1)">−</button><input type="number" id="iW" value="100" min="1" max="300" oninput="onChange()"><button class="sb" onclick="step('iW',1)">+</button><span class="unit">mm</span></div></div>
    <div class="f"><label>奥行 D</label><div class="nr"><button class="sb" onclick="step('iD',-1)">−</button><input type="number" id="iD" value="60" min="1" max="300" oninput="onChange()"><button class="sb" onclick="step('iD',1)">+</button><span class="unit">mm</span></div></div>
    <div class="f" id="iHf"><label>高さ H</label><div class="nr"><button class="sb" onclick="step('iH',-1)">−</button><input type="number" id="iH" value="40" min="1" max="300" oninput="onChange()"><button class="sb" onclick="step('iH',1)">+</button><span class="unit">mm</span></div></div>
  </div>
  <div class="sec">
    <div class="st">壁・仕切り</div>
    <div class="f"><label>壁厚</label><div class="nr"><button class="sb" onclick="step('wT',-.5)">−</button><input type="number" id="wT" value="2" min="1" max="20" step=".5" oninput="onChange()"><button class="sb" onclick="step('wT',.5)">+</button><span class="unit">mm</span></div></div>
    <div class="f" id="dTf" style="display:none"><label>仕切り厚</label><div class="nr"><button class="sb" onclick="step('dT',-.5)">−</button><input type="number" id="dT" value="1.5" min="1" max="20" step=".5" oninput="onChange()"><button class="sb" onclick="step('dT',.5)">+</button><span class="unit">mm</span></div></div>
    <div id="dcf" style="display:none">
      <div class="f"><label>X仕切り数</label><div class="nr"><button class="sb" onclick="stepDC('x',-1)">−</button><input type="number" id="xDC" value="0" min="0" max="20" oninput="onDC('x')"><button class="sb" onclick="stepDC('x',1)">+</button><span class="unit">本</span></div></div>
      <div class="f"><label>Y仕切り数</label><div class="nr"><button class="sb" onclick="stepDC('y',-1)">−</button><input type="number" id="yDC" value="0" min="0" max="20" oninput="onDC('y')"><button class="sb" onclick="stepDC('y',1)">+</button><span class="unit">本</span></div></div>
    </div>
  </div>
  <div class="sec">
    <div class="st">角丸め（外側）</div>
    <div class="tog-row"><span class="tog-label">有効</span><div class="tog" id="togR" onclick="toggleR()"><div class="tog-knob"></div></div></div>
    <div id="roundF" style="display:none">
      <div class="f"><label>半径</label><div class="nr"><button class="sb" onclick="step('rR',-.5)">−</button><input type="number" id="rR" value="2" min="0.5" max="20" step=".5" oninput="onChange()"><button class="sb" onclick="step('rR',.5)">+</button><span class="unit">mm</span></div></div>
    </div>
  </div>
  <div class="sec">
    <div class="st">スタック（重ねる）</div>
    <div class="tog-row"><span class="tog-label">スタック機能</span><div class="tog" id="togS" onclick="toggleS()"><div class="tog-knob"></div></div></div>
    <div id="stackF" style="display:none">
      <div class="f"><label>リム幅</label><div class="nr"><button class="sb" onclick="step('rimW',-.5)">−</button><input type="number" id="rimW" value="1.5" min="0.5" max="5" step=".5" oninput="onChange()"><button class="sb" onclick="step('rimW',.5)">+</button><span class="unit">mm</span></div></div>
      <div class="f"><label>リム高さ</label><div class="nr"><button class="sb" onclick="step('rimH',-.5)">−</button><input type="number" id="rimH" value="3" min="1" max="10" step=".5" oninput="onChange()"><button class="sb" onclick="step('rimH',.5)">+</button><span class="unit">mm</span></div></div>
      <p class="hint">上のケースの底外周が<br>下のケースの天面溝に入ります</p>
    </div>
  </div>
  <div class="sec" id="drawSec" style="display:none">
    <div class="st">引き出しオプション</div>
    <div class="f"><label>段数</label><div class="nr"><button class="sb" onclick="stepSt(-1)">−</button><input type="number" id="stCnt" value="1" min="1" max="10" oninput="onStCnt()"><button class="sb" onclick="stepSt(1)">+</button><span class="unit">段</span></div></div>
    <div class="f" id="stHf"><label id="stHL">段1 高さ</label><div class="nr"><button class="sb" onclick="stepStH(-1)">−</button><input type="number" id="stH" value="40" min="5" max="300" oninput="onStH()"><button class="sb" onclick="stepStH(1)">+</button><span class="unit">mm</span></div><p class="hint" id="stHhint"></p></div>
    <div class="f"><label>背面</label><div class="rg"><div class="ro on" id="rb-open" onclick="setBack('open')">開放</div><div class="ro" id="rb-closed" onclick="setBack('closed')">埋める</div></div></div>
    <div class="f"><label>持ち手</label><div class="rg"><div class="ro on" id="rh-groove" onclick="setHandle('groove')">溝</div><div class="ro" id="rh-hole" onclick="setHandle('hole')">穴</div></div></div>
    <div id="gF"><div class="f"><label>溝：幅</label><div class="nr"><button class="sb" onclick="step('gW',-1)">−</button><input type="number" id="gW" value="40" min="5" max="200" oninput="onChange()"><button class="sb" onclick="step('gW',1)">+</button><span class="unit">mm</span></div></div><div class="f"><label>溝：高さ</label><div class="nr"><button class="sb" onclick="step('gH',-1)">−</button><input type="number" id="gH" value="8" min="3" max="50" oninput="onChange()"><button class="sb" onclick="step('gH',1)">+</button><span class="unit">mm</span></div></div></div>
    <div id="hF" style="display:none"><div class="f"><label>穴：直径</label><div class="nr"><button class="sb" onclick="step('hD',-1)">−</button><input type="number" id="hD" value="20" min="5" max="100" oninput="onChange()"><button class="sb" onclick="step('hD',1)">+</button><span class="unit">mm</span></div></div></div>
  </div>
</div>

<div id="ca">
  <div id="cbar">
    <span class="bl" id="mLbl">編集モード</span>
    <span style="color:var(--bd2)">|</span>
    <span class="bi" id="dInfo">内寸 W:100 D:60 H:40mm</span>
    <span style="color:var(--bd2)">|</span>
    <span class="bi" id="oInfo">外寸 W:104 D:64 H:44mm</span>
    <span class="bi" id="h3d" style="display:none;margin-left:auto;color:var(--t3)">ドラッグ回転 / ホイールズーム</span>
  </div>
  <div id="cw">
    <canvas id="c2"></canvas>
    <canvas id="c3" style="display:none;cursor:grab;"></canvas>
    <div id="wb">⚠ 仕切りが重なっています</div>
    <div id="ctip">矢印をドラッグして仕切りを移動</div>
  </div>
</div>

<div id="rp" style="display:none">
  <div class="rst">仕切り管理</div>
  <div id="stageTabs"></div>
  <div id="rpbody">
    <div id="selBox">
      <div class="sbt">▶ 選択中</div>
      <div class="f"><label>位置</label><div class="nr"><button class="sb" onclick="stepSel(-1)">−</button><input type="number" id="selPos" value="0" min="1" max="299" oninput="moveSel(this.value)"><button class="sb" onclick="stepSel(1)">+</button><span class="unit">mm</span></div></div>
      <button class="btn" style="width:100%;font-size:10px;border-color:var(--dn);color:var(--dn);" onclick="delSel()">削除</button>
    </div>
    <div class="dat">─ X方向（幅）</div>
    <div class="dl" id="xList"></div>
    <button class="addbtn" onclick="addDivBtn('x')">＋ 幅方向に追加</button>
    <div style="height:8px"></div>
    <div class="dat">─ Y方向（奥行）</div>
    <div class="dl" id="yList"></div>
    <button class="addbtn" onclick="addDivBtn('y')">＋ 奥行方向に追加</button>
  </div>
</div>
</div>

<div class="ov" id="expOv">
  <div class="modal">
    <h2>↓ エクスポート</h2>
    <div class="f"><label>フォーマット</label><div class="rg"><div class="ro on" id="ef-stl" onclick="setFmt('stl')">STL</div><div class="ro" id="ef-obj" onclick="setFmt('obj')">OBJ</div></div></div>
    <p class="mnote" id="eNote"></p>
    <div class="mbtns"><button class="btn hi" onclick="doExport()">ダウンロード</button><button class="btn" onclick="closeExp()">キャンセル</button></div>
  </div>
</div>

<script>
'use strict';
const S={
  type:'case',iW:100,iD:60,iH:40,wT:2,dT:1.5,
  useR:false,rR:2,useS:false,rimW:1.5,rimH:3,
  backType:'open',handleType:'groove',gW:40,gH:8,hD:20,
  xDiv:[],yDiv:[],
  stages:[{h:40,xDiv:[],yDiv:[]}],curStage:0,
  selDiv:null,is3d:false,fmt:'stl'
};
const HD=t=>['case-fixed','case-movable','drawer-fixed','drawer-movable'].includes(t);
const ID=t=>['drawer','drawer-fixed','drawer-movable'].includes(t);

let c2,ctx2,c3,ctx3,dragDiv=null,_dragging=false;
let rot={x:.42,y:.68},zoom=1,drag3=false,lm3={x:0,y:0};

window.addEventListener('load',()=>{
  c2=g('c2');ctx2=c2.getContext('2d');
  c3=g('c3');ctx3=c3.getContext('2d');
  resize();window.addEventListener('resize',resize);
  c2.addEventListener('mousedown',m2Dn);
  document.addEventListener('mousemove',m2Mv);
  document.addEventListener('mouseup',m2Up);
  c3.addEventListener('mousedown',e=>{drag3=true;lm3={x:e.clientX,y:e.clientY};c3.style.cursor='grabbing';e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!drag3)return;rot.y+=(e.clientX-lm3.x)*.012;rot.x+=(e.clientY-lm3.y)*.012;lm3={x:e.clientX,y:e.clientY};draw3();});
  document.addEventListener('mouseup',()=>{if(drag3){drag3=false;c3.style.cursor='grab';}});
  c3.addEventListener('wheel',e=>{zoom=cl(zoom-e.deltaY*.001,.3,3);draw3();e.preventDefault();},{passive:false});
  onChange();
});
function resize(){const w=g('cw');c2.width=c3.width=w.clientWidth;c2.height=c3.height=w.clientHeight;draw();}
const g=id=>document.getElementById(id);
const gv=id=>parseFloat(g(id).value)||0;
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
function step(id,d){const el=g(id);el.value=cl(parseFloat(el.value)+d,parseFloat(el.min||0),parseFloat(el.max||9999));onChange();}

function toggleR(){S.useR=!S.useR;g('togR').classList.toggle('on',S.useR);g('roundF').style.display=S.useR?'block':'none';draw();}
function toggleS(){S.useS=!S.useS;g('togS').classList.toggle('on',S.useS);g('stackF').style.display=S.useS?'block':'none';draw();}

function stepDC(ax,d){const el=g(ax+'DC');el.value=cl(parseFloat(el.value)+d,0,20);onDC(ax);}
function onDC(ax){
  const n=cl(parseInt(g(ax+'DC').value)||0,0,20);
  const arr=ax==='x'?getXDiv():getYDiv(),mx=ax==='x'?S.iW:S.iD;
  arr.length=0;for(let i=1;i<=n;i++)arr.push(Math.round(mx*i/(n+1)));
  checkOv();renderLists();draw2();
}
function getXDiv(){return ID(S.type)?S.stages[S.curStage].xDiv:S.xDiv;}
function getYDiv(){return ID(S.type)?S.stages[S.curStage].yDiv:S.yDiv;}
function stepSt(d){g('stCnt').value=cl(parseFloat(g('stCnt').value)+d,1,10);onStCnt();}
function onStCnt(){
  const n=cl(parseInt(g('stCnt').value)||1,1,10);
  while(S.stages.length<n)S.stages.push({h:S.stages[0].h,xDiv:[],yDiv:[]});
  while(S.stages.length>n)S.stages.pop();
  if(S.curStage>=n)S.curStage=n-1;
  syncStUI();renderStageTabs();renderLists();onChange();
}
function syncStUI(){
  const st=S.stages[S.curStage];g('stH').value=st.h;g('stHL').textContent=`段${S.curStage+1} 高さ`;
  const tot=S.stages.reduce((s,x)=>s+x.h,0);g('stHhint').textContent=`合計 ${tot}mm`;
  S.iH=tot;g('iH').value=tot;
}
function stepStH(d){g('stH').value=cl(parseFloat(g('stH').value)+d,5,300);onStH();}

const AWR=7;
function getSc(){

function dStackRim2d(c,ox,oy,oW,oH,sc){

  c.fillStyle='#12162a';c.fillRect(ox,ty,oW,tpH);c.strokeStyle='#242860';c.lineWidth=1.5;c.strokeRect(ox,ty,oW,tpH);
  c.fillStyle='#05050d';c.fillRect(ox+wt*sc,ty+wt*sc,iW*sc,iD*sc);c.strokeStyle='#0f1120';c.lineWidth=1;c.strokeRect(ox+wt*sc,ty+wt*sc,iW*sc,iD*sc);

  if(HD(S.type)){dDivs(c,ox,ty,sc,wt,iW,iD,cst.xDiv,cst.yDiv);dSegs(c,ox,ty,sc,wt,iW,iD,cst.xDiv,cst.yDiv);}
  c.fillStyle='#24286a';c.font='9px monospace';c.textAlign='left';c.textBaseline='bottom';c.fillText(`TOP — 段${S.curStage+1} 内部`,ox,ty-4);
  dimL(c,ox,ty+tpH+12,ox+oW,ty+tpH+12,`W:${iW+wt*2}mm`);dimL(c,ox+oW+12,ty,ox+oW+12,ty+tpH,`D:${iD+wt*2}mm`);

function dDivs(c,ox,oy,sc,wt,iW,iD,xDiv,yDiv){
  const iX=ox+wt*sc,iY=oy+wt*sc;
  xDiv.forEach((p,i)=>{const sel=S.selDiv&&S.selDiv.axis==='x'&&S.selDiv.idx===i,dx=iX+p*sc;c.fillStyle=sel?'rgba(74,158,255,.65)':'rgba(74,158,255,.28)';c.fillRect(dx-S.dT*sc/2,iY,S.dT*sc,iD*sc);c.strokeStyle=sel?'#80c8ff':'#3a80cc';c.lineWidth=sel?2:1;c.strokeRect(dx-S.dT*sc/2,iY,S.dT*sc,iD*sc);c.fillStyle='#5ab0ff';c.font='9px monospace';c.textAlign='center';c.textBaseline='bottom';c.fillText(`${p}mm`,dx,iY-2);dArr(c,dx-(AWR+5),iY+iD*sc/2,'L',sel);dArr(c,dx+(AWR+5),iY+iD*sc/2,'R',sel);});

function dArr(c,x,y,dir,active){

function dimL(c,x1,y1,x2,y2,txt){c.strokeStyle='#252538';c.lineWidth=1;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.fillStyle='#44445a';c.font='10px monospace';c.textAlign='center';c.textBaseline='middle';c.fillText(txt,(x1+x2)/2+(y1===y2?0:12),(y1+y2)/2+(y1===y2?-7:0));}

function hitTest(ex,ey){
  const r=c2.getBoundingClientRect(),mx=ex-r.left,my=ey-r.top;
  const{x:iX,y:iY,sc}=getIO(),xd=getXDiv(),yd=getYDiv(),HIT=AWR+6;
  for(let i=0;i<xd.length;i++){const dx=iX+xd[i]*sc,cy=iY+S.iD*sc/2;if(Math.hypot(mx-(dx-AWR-5),my-cy)<HIT||Math.hypot(mx-(dx+AWR+5),my-cy)<HIT||Math.abs(mx-dx)<9&&my>=iY&&my<=iY+S.iD*sc)return{axis:'x',idx:i};}
  for(let i=0;i<yd.length;i++){const dy=iY+yd[i]*sc,cx=iX+S.iW*sc/2;if(Math.hypot(mx-cx,my-(dy-AWR-5))<HIT||Math.hypot(mx-cx,my-(dy+AWR+5))<HIT||Math.abs(my-dy)<9&&mx>=iX&&mx<=iX+S.iW*sc)return{axis:'y',idx:i};}
  return null;
}
function m2Dn(e){
  if(S.is3d||!HD(S.type))return;
  const hit=hitTest(e.clientX,e.clientY);
  if(hit){_dragging=true;dragDiv=hit;S.selDiv={axis:hit.axis,idx:hit.idx};document.body.style.cursor=hit.axis==='x'?'ew-resize':'ns-resize';syncSel();renderLists();draw2();e.preventDefault();}
  else{S.selDiv=null;g('selBox').classList.remove('on');renderLists();draw2();}
}
function m2Mv(e){
  if(S.is3d)return;
  if(!_dragging){if(HD(S.type)){const hit=hitTest(e.clientX,e.clientY);c2.style.cursor=hit?(hit.axis==='x'?'ew-resize':'ns-resize'):'default';}return;}
  const r=c2.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const{x:iX,y:iY,sc}=getIO();
  const arr=dragDiv.axis==='x'?getXDiv():getYDiv(),mxV=dragDiv.axis==='x'?S.iW:S.iD;
  arr[dragDiv.idx]=cl(Math.round(dragDiv.axis==='x'?(mx-iX)/sc:(my-iY)/sc),1,mxV-1);

function m2Up(){if(_dragging){_dragging=false;dragDiv=null;document.body.style.cursor='';c2.style.cursor='default';checkOv();renderLists();draw2();}}

// ═══════════════════════════════════════════════════════
// MESH GENERATION — watertight hollow shell for 3D printing
// 
// Strategy: build each wall as a THIN PLATE with both outer+inner faces.
// A plate at position X with thickness T:
//   outer face at X, inner face at X+T (normals pointing away from each other)
//   + 4 edge faces to close the perimeter.
// This creates a watertight manifold that slicers correctly see as hollow.
// ═══════════════════════════════════════════════════════

// Generate triangles for a quad face
function quad(a,b,cc,d,n){return[{v:[a,b,cc],n},{v:[a,cc,d],n}];}

// Plate: a flat rectangular plate with thickness, fully closed (6 faces)
// Axis: 'x'=plate perpendicular to X, 'y'=perp Y, 'z'=perp Z
function plate(x1,y1,z1,x2,y2,z2,ax){
  // (x1,y1,z1)-(x2,y2,z2) define the two opposite corners of the plate's extent
  // ax = which axis is "thin" (the thickness direction)
  const t=[];
  if(ax==='y'){
    // plate in XZ plane, thin in Y direction
    const A=[x1,y1,z1],B=[x2,y1,z1],C=[x2,y1,z2],D=[x1,y1,z2];
    const E=[x1,y2,z1],F=[x2,y2,z1],G=[x2,y2,z2],H=[x1,y2,z2];
    t.push(...quad(A,B,C,D,[0,-1,0]));  // bottom face (Y-)
    t.push(...quad(E,H,G,F,[0,1,0]));   // top face (Y+)
    t.push(...quad(A,E,F,B,[0,0,-1]));  // front (Z-)
    t.push(...quad(D,C,G,H,[0,0,1]));   // back (Z+)
    t.push(...quad(A,D,H,E,[-1,0,0])); // left (X-)
    t.push(...quad(B,F,G,C,[1,0,0]));  // right (X+)
  }else if(ax==='x'){
    const A=[x1,y1,z1],B=[x1,y2,z1],C=[x1,y2,z2],D=[x1,y1,z2];
    const E=[x2,y1,z1],F=[x2,y2,z1],G=[x2,y2,z2],H=[x2,y1,z2];
    t.push(...quad(A,D,C,B,[-1,0,0]));
    t.push(...quad(E,F,G,H,[1,0,0]));
    t.push(...quad(A,E,F,B,[0,0,-1]));
    t.push(...quad(D,H,G,C,[0,0,1]));
    t.push(...quad(A,B,F,E,[0,-1,0]));
    t.push(...quad(D,C,G,H,[0,1,0]));
  }else{ // ax==='z'
    const A=[x1,y1,z1],B=[x2,y1,z1],C=[x2,y2,z1],D=[x1,y2,z1];
    const E=[x1,y1,z2],F=[x2,y1,z2],G=[x2,y2,z2],H=[x1,y2,z2];
    t.push(...quad(A,B,C,D,[0,0,-1]));
    t.push(...quad(E,H,G,F,[0,0,1]));
    t.push(...quad(A,E,F,B,[0,-1,0]));
    t.push(...quad(D,C,G,H,[0,1,0]));
    t.push(...quad(A,D,H,E,[-1,0,0]));
    t.push(...quad(B,F,G,C,[1,0,0]));
  }
  return t;
}

// Build a watertight hollow box shell from individual wall plates
// ox,oy,oz = outer origin. ow,oh,od = outer dims. wt = wall thickness.
// openTop: no top plate. openBack: no back wall (Z+ face).
function hollowShell(ox,oy,oz,ow,oh,od,wt,openTop,openBack){
  const t=[];
  const x0=ox,x1=ox+ow,y0=oy,y1=oy+oh,z0=oz,z1=oz+od;
  const xi=ox+wt,xo=ox+ow-wt,yi=oy+wt,yo=oy+oh-wt,zi=oz+wt,zo=oz+od-wt;

  // Bottom plate (full width/depth, Y-axis thin)
  t.push(...plate(x0,y0,z0,x1,yi,z1,'y'));

  // Top plate
  if(!openTop) t.push(...plate(x0,yo,z0,x1,y1,z1,'y'));

  // Front wall (Z-), from yi to yo (excluding corners already covered by bottom/top)
  t.push(...plate(x0,yi,z0,x1,yo,zi,'z'));

  // Back wall (Z+)
  if(!openBack) t.push(...plate(x0,yi,zo,x1,yo,z1,'z'));

  // Left wall (X-), inner depth = zi to zo (excluding front/back wall thickness)
  const zLeft0=openBack?zi:zi, zLeft1=openBack?zo:zo;
  t.push(...plate(x0,yi,zi,xi,yo,zo,'x'));

  // Right wall (X+)
  t.push(...plate(xo,yi,zi,x1,yo,zo,'x'));

  return t;
}

// Divider plate (solid, both faces exposed)
function dividerPlate(x,y,z,w,h,d){
  return plate(x,y,z,x+w,y+h,z+d,'x'[w<h&&w<d?'x':d<w&&d<h?'z':'y']);
}

// Smart divider: pick thin axis automatically
function divPlate(x,y,z,w,h,d){
  // Find smallest dimension = thin axis
  const ax=w<=h&&w<=d?'x':d<=w&&d<=h?'z':'y';
  return plate(x,y,z,x+w,y+h,z+d,ax);
}

// Stack rim: grooves on top inner edge + ledge on bottom outer edge
// Returns triangles for the rim/ledge system
function stackRimTris(ow,oh,od,wt){
  const t=[];
  const rw=S.rimW,rh=S.rimH;
  // Top groove walls (inner perimeter near top)
  // groove is at top, inside the outer wall
  // Front groove wall: strip along Z- inside, at X=[rw..ow-rw], Y=[oh-wt-rh..oh-wt], Z=[wt..wt+rw]
  const gY0=oh-wt-rh,gY1=oh-wt;
  t.push(...plate(rw,gY0,wt,ow-rw,gY1,wt+rw,'z'));         // front inner groove wall
  t.push(...plate(rw,gY0,od-wt-rw,ow-rw,gY1,od-wt,'z'));   // back inner groove wall
  t.push(...plate(wt,gY0,wt+rw,wt+rw,gY1,od-wt-rw,'x'));   // left inner groove wall
  t.push(...plate(ow-wt-rw,gY0,wt+rw,ow-wt,gY1,od-wt-rw,'x')); // right inner groove wall

  // Bottom ledge (protrudes downward, fits into above groove)
  // ledge is at Y=[-rh..0], at perimeter [0..ow]x[0..od] minus inner [rw..ow-rw]x[rw..od-rw]
  const lY0=-rh,lY1=0;
  t.push(...plate(0,lY0,0,ow,lY1,rw,'z'));          // front ledge
  t.push(...plate(0,lY0,od-rw,ow,lY1,od,'z'));      // back ledge
  t.push(...plate(0,lY0,rw,rw,lY1,od-rw,'x'));      // left ledge
  t.push(...plate(ow-rw,lY0,rw,ow,lY1,od-rw,'x')); // right ledge

  return t;
}

// ── Case mesh builders ──
function meshCase(){
  const wt=S.wT,iW=S.iW,iD=S.iD,iH=S.iH,ow=iW+wt*2,oh=iH+wt*2,od=iD+wt*2;
  let t=hollowShell(0,0,0,ow,oh,od,wt,false,false);
  if(S.type==='case-fixed'){
    S.xDiv.forEach(p=>t.push(...divPlate(wt+p-S.dT/2,wt,wt,S.dT,iH,iD)));
    S.yDiv.forEach(p=>t.push(...divPlate(wt,wt,wt+p-S.dT/2,iW,iH,S.dT)));
  }
  if(S.useS)t.push(...stackRimTris(ow,oh,od,wt));
  return t;
}
function meshOuter(){
  const wt=S.wT,iW=S.iW,iD=S.iD,tH=S.stages.reduce((s,st)=>s+st.h,0);
  const ow=iW+wt*2,oh=tH+wt*2,od=iD+wt*2;
  let t=hollowShell(0,0,0,ow,oh,od,wt,false,S.backType==='open');
  if(S.useS)t.push(...stackRimTris(ow,oh,od,wt));
  return t;
}
function meshDrawer(si,withDiv){
  const wt=S.wT,iW=S.iW,iD=S.iD,st=S.stages[si],sh=st.h;
  const ow=iW+wt*2,od=iD+wt*2;
  // Drawer: bottom+front+sides, NO top (open), optional back
  let t=hollowShell(0,0,0,ow,sh+wt,od,wt,true,S.backType==='open');
  if(withDiv){
    st.xDiv.forEach(p=>t.push(...divPlate(wt+p-S.dT/2,wt,wt,S.dT,sh,iD)));
    st.yDiv.forEach(p=>t.push(...divPlate(wt,wt,wt+p-S.dT/2,iW,sh,S.dT)));
  }
  return t;
}

// ── Export ──
function openExp(){
  g('expOv').classList.add('on');
  const n={'case':'1ファイル（中空ケース）','case-fixed':'1ファイル（ケース＋仕切り一体）','case-movable':'ZIP：ケース＋仕切り別','drawer':'ZIP：外枠＋各段引き出し','drawer-fixed':'ZIP：外枠＋各段（仕切り一体）','drawer-movable':'ZIP：外枠＋各段＋仕切り別'};

  }else if(S.type==='case-movable'){

    f[`case.${fmt}`]=enc(hollowShell(0,0,0,ow,oh,od,wt,false,false),fmt,'case');
    S.xDiv.forEach((p,i)=>f[`div_x${i+1}.${fmt}`]=enc(divPlate(wt+p-S.dT/2,wt,wt,S.dT,S.iH,S.iD),fmt,'div'));
    S.yDiv.forEach((p,i)=>f[`div_y${i+1}.${fmt}`]=enc(divPlate(wt,wt,wt+p-S.dT/2,S.iW,S.iH,S.dT),fmt,'div'));
    await dlZip(f,'case_movable.zip');
  }else{

    S.stages.forEach((st,si)=>{
      const wd=S.type==='drawer-fixed';
      f[`drawer_stage${si+1}.${fmt}`]=enc(meshDrawer(si,wd),fmt,`d${si+1}`);
      if(S.type==='drawer-movable'){
        st.xDiv.forEach((p,i)=>f[`s${si+1}_divX${i+1}.${fmt}`]=enc(divPlate(S.wT+p-S.dT/2,S.wT,S.wT,S.dT,st.h,S.iD),fmt,'div'));
        st.yDiv.forEach((p,i)=>f[`s${si+1}_divY${i+1}.${fmt}`]=enc(divPlate(S.wT,S.wT,S.wT+p-S.dT/2,S.iW,st.h,S.dT),fmt,'div'));
      }

function toOBJ(tris,name){

  const av=v=>{const k=v.map(n=>n.toFixed(4)).join(',');if(vm[k]==null){vs.push(v);vm[k]=vs.length;}return vm[k];};

}
function dlTxt(c,n){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/plain'}));a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
async function dlZip(files,name){const b=await buildZip(files);const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}

function cat(bufs){const t=bufs.reduce((s,b)=>s+b.length,0),o=new Uint8Array(t);let p=0;bufs.forEach(b=>{o.set(b,p);p+=b.length;});return o;}
function crc32(d){let c=0xFFFFFFFF;for(let i=0;i<d.length;i++){c^=d[i];for(let j=0;j<8;j++)c=(c>>>1)^(0xEDB88320&-(c&1));}return(c^0xFFFFFFFF)>>>0;}
