<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Case Modeler - Stable Phase1</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; overflow:hidden; }
#ui {
  position:fixed;
  left:0;
  top:0;
  width:280px;
  height:100%;
  background:#f0f0f0;
  padding:10px;
  box-sizing:border-box;
  overflow:auto;
  z-index:10;
}
canvas { display:block; }
label { display:block; margin-top:8px; }
input, select { width:100%; }
.warning { color:red; font-weight:bold; }
</style>
</head>
<body>

<div id="ui">
<h3>基本設定</h3>

<label>種類</label>
<select id="type">
  <option value="case">ケース</option>
  <option value="drawer">引き出し</option>
</select>

<label>幅 (1-300mm)</label>
<input type="number" id="width" value="120">

<label>奥行 (1-300mm)</label>
<input type="number" id="depth" value="100">

<label>高さ (1-300mm)</label>
<input type="number" id="height" value="60">

<label>壁厚さ (1mm以上)</label>
<input type="number" id="wall" value="3">

<label>表示モード</label>
<select id="mode">
  <option value="view">3D表示</option>
  <option value="edit">上から表示</option>
</select>

<div class="warning" id="warning"></div>
</div>

<canvas id="canvas"></canvas>

<script>
/* ==== デバッグ ==== */
window.onerror = function(msg, src, line){
  document.body.innerHTML +=
  "<div style='position:fixed;bottom:0;left:0;background:red;color:white;padding:5px;font-size:12px;z-index:9999;'>"
  + msg + " (line:"+line+")</div>";
};

document.body.innerHTML +=
"<div style='position:fixed;top:0;right:0;background:blue;color:white;padding:3px;font-size:12px;z-index:9999;'>THREE:"
+ typeof THREE + "</div>";

/* ==== Three基本 ==== */

let scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

let renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("canvas"),
  antialias:true
});

let camera = new THREE.PerspectiveCamera(
  45,
  1,
  0.1,
  2000
);

camera.position.set(200,200,200);
camera.lookAt(0,0,0);

function resize(){
  let w = Math.max(window.innerWidth-280,300);
  let h = window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize",resize);
resize();

scene.add(new THREE.AmbientLight(0xffffff,0.6));
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(200,300,200);
scene.add(light);

let modelGroup = new THREE.Group();
scene.add(modelGroup);

/* ==== モデル生成 ==== */

function validate(w,d,h,wall){
  if(w<1||d<1||h<1||w>300||d>300||h>300)
    return "サイズは1〜300mm";
  if(wall<1) return "壁厚さは1mm以上";
  if(wall*2>=w||wall*2>=d||wall>=h)
    return "壁厚さが大きすぎる";
  return "";
}

function updateModel(){

  let w = parseFloat(width.value);
  let d = parseFloat(depth.value);
  let h = parseFloat(height.value);
  let wall = parseFloat(wallInput.value);
  let type = typeSelect.value;
  let mode = modeSelect.value;

  let warn = validate(w,d,h,wall);
  warning.innerText = warn;
  if(warn) return;

  modelGroup.clear();

  // 外側
  let outer = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({color:0xcccccc})
  );
  modelGroup.add(outer);

  // 内側（空間表現）
  let inner = new THREE.Mesh(
    new THREE.BoxGeometry(w-wall*2,h-wall,d-wall*2),
    new THREE.MeshStandardMaterial({color:0x888888, wireframe:true})
  );
  inner.position.y = wall/2;
  modelGroup.add(inner);

  if(type==="drawer"){
    let drawer = new THREE.Mesh(
      new THREE.BoxGeometry(w-wall*2,h-wall,d-wall*2),
      new THREE.MeshStandardMaterial({color:0x999999})
    );
    drawer.position.z = -d/3;
    modelGroup.add(drawer);
  }

  // モード切替
  if(mode==="edit"){
    camera.position.set(0,500,0);
    camera.lookAt(0,0,0);
  }else{
    camera.position.set(200,200,200);
    camera.lookAt(0,0,0);
  }
}

/* ==== UI連動 ==== */

let width = document.getElementById("width");
let depth = document.getElementById("depth");
let height = document.getElementById("height");
let wallInput = document.getElementById("wall");
let typeSelect = document.getElementById("type");
let modeSelect = document.getElementById("mode");
let warning = document.getElementById("warning");

document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("input",updateModel);
});

updateModel();

/* ==== 描画ループ ==== */
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
