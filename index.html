<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Hybrid Designer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #ecf0f1; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--bg); }
        header { height: 40px; background: var(--primary); color: white; display: flex; align-items: center; padding: 0 15px; font-weight: bold; font-size: 14px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        aside { width: 280px; background: white; border-right: 1px solid #ccc; overflow-y: auto; padding: 15px; flex-shrink: 0; }
        .view-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        #container3d { flex: 1.5; background: #dfe6e9; touch-action: none; position: relative; }
        #container2d { flex: 1; background: white; border-top: 3px solid var(--primary); display: flex; }
        .canvas-half { flex: 1; border-right: 1px solid #eee; position: relative; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; color: #7f8c8d; margin-bottom: 3px; }
        .row { display: flex; gap: 4px; }
        input, select { width: 100%; padding: 7px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 13px; }
        .btn { background: var(--accent); color: white; border: none; padding: 8px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .info-card { background: #f8f9fa; padding: 8px; border-radius: 4px; margin-top: 10px; border-left: 4px solid var(--accent); font-size: 11px; }
        .tag { position: absolute; top: 6px; left: 10px; font-size: 9px; font-weight: bold; color: rgba(0,0,0,0.3); pointer-events: none; }
    </style>
</head>
<body>

<header>STORAGE DESIGNER PRO - INTEGRATED</header>

<div class="main-layout">
    <aside>
        <div class="input-group">
            <label>引き出し内寸 (W / D / H)</label>
            <div class="row">
                <input type="number" id="in_w" value="100">
                <input type="number" id="in_d" value="120">
                <input type="number" id="in_h" value="40">
            </div>
        </div>
        <div class="input-group">
            <label>肉厚 (引き出し / 外枠)</label>
            <div class="row">
                <input type="number" id="t_tray" value="2.0" step="0.1">
                <input type="number" id="t_shell" value="2.5" step="0.1">
            </div>
        </div>
        <div class="input-group">
            <label>遊び(Gap) / 仕切り数</label>
            <div class="row">
                <input type="number" id="gap" value="1.0" step="0.1">
                <input type="number" id="nv" value="1" min="0">
            </div>
        </div>
        <div class="input-group">
            <label>スタッキング構造</label>
            <select id="stack_mode">
                <option value="none">なし</option>
                <option value="pin" selected>ピン連結</option>
                <option value="groove">溝ハメ（安定）</option>
            </select>
        </div>
        <button class="btn" onclick="state.open = !state.open">引き出しをスライド</button>
        <div class="info-card" id="stats">計算中...</div>
    </aside>

    <div class="view-container">
        <div id="container3d"><div class="tag">3D: 寸法が浮いて表示されます</div></div>
        <div id="container2d">
            <div class="canvas-half"><div class="tag">TOP VIEW (DRAG BLUE LINE)</div><canvas id="canvasTop"></canvas></div>
            <div class="canvas-half"><div class="tag">FRONT VIEW</div><canvas id="canvasFront"></canvas></div>
        </div>
    </div>
</div>

<script>
    const state = { w:100, d:120, h:40, tt:2, ts:2.5, gap:1, nv:1, vParts:[50], open:false, slide:0, rotX:-0.5, rotY:0.5, zoom:500, selected:null };
    let scene, camera, renderer, trayGroup, shellGroup, dimGroup, lastPointers = [];

    window.onload = () => {
        init3D();
        setupInteraction();
        sync();
        animate();
    };

    function init3D() {
        const c3d = document.getElementById('container3d');
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xdfe6e9);
        camera = new THREE.PerspectiveCamera(45, c3d.clientWidth/c3d.clientHeight, 1, 5000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(c3d.clientWidth, c3d.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        c3d.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(200,400,200); scene.add(sun);
        trayGroup = new THREE.Group(); shellGroup = new THREE.Group(); dimGroup = new THREE.Group();
        scene.add(trayGroup, shellGroup, dimGroup);
    }

    // 数値を浮かせるためのキャンバス生成
    function createTextLabel(text, pos) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 128; canvas.height = 64;
        ctx.fillStyle = 'white'; ctx.fillRect(0,0,128,64);
        ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 4; ctx.strokeRect(0,0,128,64);
        ctx.fillStyle = 'black'; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(text, 64, 45);
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({ map: tex });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(30, 15, 1); sprite.position.copy(pos);
        return sprite;
    }

    function sync() {
        state.w = parseFloat(in_w.value); state.d = parseFloat(in_d.value); state.h = parseFloat(in_h.value);
        state.tt = parseFloat(t_tray.value); state.ts = parseFloat(t_shell.value); state.gap = parseFloat(gap.value);
        state.nv = parseInt(nv.value);
        if(state.vParts.length !== state.nv) state.vParts = Array.from({length:state.nv}, (_,i)=>(state.w/(state.nv+1))*(i+1));
        buildModels();
        draw2D();
    }

    function buildModels() {
        trayGroup.clear(); shellGroup.clear(); dimGroup.clear();
        const matT = new THREE.MeshPhongMaterial({ color: 0x3498db });
        const matS = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });

        const tw = state.w + state.tt*2, td = state.d + state.tt*2, th = state.h + state.tt;
        const sw_out = (tw + state.gap*2) + state.ts*2, sd_out = (td + state.gap) + state.ts, sh_out = (th + state.gap) + state.ts*2;

        // Tray Modeling
        const floor = new THREE.Mesh(new THREE.BoxGeometry(tw, state.tt, td), matT);
        floor.position.y = state.tt/2; trayGroup.add(floor);
        [[state.tt, state.h, td, -(state.w/2+state.tt/2), state.h/2+state.tt, 0], 
         [state.tt, state.h, td, (state.w/2+state.tt/2), state.h/2+state.tt, 0],
         [state.w, state.h, state.tt, 0, state.h/2+state.tt, -(state.d/2+state.tt/2)],
         [state.w, state.h, state.tt, 0, state.h/2+state.tt, (state.d/2+state.tt/2)]].forEach(p => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(p[0],p[1],p[2]), matT); m.position.set(p[3],p[4],p[5]); trayGroup.add(m);
        });
        state.vParts.forEach(p => {
            const v = new THREE.Mesh(new THREE.BoxGeometry(state.tt, state.h, state.d), matT);
            v.position.set(-state.w/2 + p, state.h/2+state.tt, 0); trayGroup.add(v);
        });

        // Shell Modeling
        const sParts = [[state.ts,sh_out,sd_out,-( (tw+state.gap*2)/2+state.ts/2 ),sh_out/2,-state.ts/2],[state.ts,sh_out,sd_out,( (tw+state.gap*2)/2+state.ts/2 ),sh_out/2,-state.ts/2],[sw_out,state.ts,sd_out,0,state.ts/2,-state.ts/2],[sw_out,state.ts,sd_out,0,sh_out-state.ts/2,-state.ts/2],[tw+state.gap*2,th+state.gap,state.ts,0,sh_out/2,-( (td+state.gap)/2+state.ts/2 )]];
        sParts.forEach(p => { const m = new THREE.Mesh(new THREE.BoxGeometry(p[0],p[1],p[2]), matS); m.position.set(p[3],p[4],p[5]); shellGroup.add(m); });

        // Stacking
        const mode = document.getElementById('stack_mode').value;
        if(mode !== "none") {
            const geo = mode === "pin" ? new THREE.CylinderGeometry(4,4,6,16) : new THREE.BoxGeometry(sw_out*0.6, 4, 10);
            const pin = new THREE.Mesh(geo, matS); pin.position.set(0, sh_out, 0); shellGroup.add(pin);
            const hole = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0xff0000, wireframe:true})); hole.position.set(0, 0, 0); shellGroup.add(hole);
        }

        // --- 寸法線を浮かせて表示 ---
        dimGroup.add(createTextLabel(`${sw_out.toFixed(1)}`, new THREE.Vector3(0, -15, sd_out/2))); // 横幅
        dimGroup.add(createTextLabel(`${sh_out.toFixed(1)}`, new THREE.Vector3(sw_out/2 + 15, sh_out/2, 0))); // 高さ
        dimGroup.add(createTextLabel(`${sd_out.toFixed(1)}`, new THREE.Vector3(-(sw_out/2+15), 10, 0))); // 奥行

        document.getElementById('stats').innerText = `外枠外寸: ${sw_out.toFixed(1)}x${sd_out.toFixed(1)}x${sh_out.toFixed(1)}mm`;
    }

    function draw2D() {
        const cT = document.getElementById('canvasTop'), cF = document.getElementById('canvasFront');
        [cT, cF].forEach(c => { c.width = c.offsetWidth; c.height = c.offsetHeight; });
        const ctxT = cT.getContext('2d');
        const sc = Math.min((cT.width-40)/state.w, (cT.height-40)/state.d);
        const ox = cT.width/2, oy = cT.height/2;
        ctxT.strokeStyle = "#2c3e50"; ctxT.strokeRect(ox-state.w*sc/2, oy-state.d*sc/2, state.w*sc, state.d*sc);
        state.vParts.forEach((p,i) => {
            ctxT.strokeStyle = (state.selected?.i===i) ? "red" : "#3498db";
            ctxT.lineWidth = 4; ctxT.beginPath(); ctxT.moveTo(ox-state.w*sc/2+p*sc, oy-state.d*sc/2); ctxT.lineTo(ox-state.w*sc/2+p*sc, oy+state.d*sc/2); ctxT.stroke();
        });
    }

    function setupInteraction() {
        const c3d = document.getElementById('container3d'), c2d = document.getElementById('canvasTop');
        c3d.addEventListener('pointerdown', e => { lastPointers.push(e); });
        window.addEventListener('pointermove', e => {
            const idx = lastPointers.findIndex(p => p.pointerId === e.pointerId);
            if(idx === -1) return;
            const prev = lastPointers[idx];
            if(lastPointers.length === 1) {
                state.rotY += (e.clientX - prev.clientX) * 0.007; state.rotX += (e.clientY - prev.clientY) * 0.007;
            } else if(lastPointers.length === 2) {
                const p2 = lastPointers[1-idx];
                const d1 = Math.hypot(prev.clientX-p2.clientX, prev.clientY-p2.clientY);
                const d2 = Math.hypot(e.clientX-p2.clientX, e.clientY-p2.clientY);
                state.zoom -= (d2 - d1) * 2;
            }
            lastPointers[idx] = e;
        });
        window.addEventListener('pointerup', e => { lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId); });
        
        c2d.addEventListener('pointerdown', e => {
            const r = c2d.getBoundingClientRect(); const sc = Math.min((c2d.width-40)/state.w, (c2d.height-40)/state.d);
            const px = (e.clientX-r.left-c2d.width/2)/sc + state.w/2;
            state.vParts.forEach((p,i) => { if(Math.abs(p-px)<10) state.selected = {i}; });
        });
        window.addEventListener('pointermove', e => {
            if(!state.selected) return;
            const r = c2d.getBoundingClientRect(); const sc = Math.min((c2d.width-40)/state.w, (c2d.height-40)/state.d);
            state.vParts[state.selected.i] = Math.max(0, Math.min(state.w, (e.clientX-r.left-c2d.width/2)/sc + state.w/2));
            sync();
        });
        window.addEventListener('pointerup', () => state.selected = null);
        document.querySelectorAll('input, select').forEach(el => el.oninput = sync);
    }

    function animate() {
        requestAnimationFrame(animate);
        state.slide += ((state.open ? state.d : 0) - state.slide) * 0.1;
        trayGroup.position.z = state.slide;
        camera.position.set(state.zoom*Math.sin(state.rotY)*Math.cos(state.rotX), state.zoom*Math.sin(state.rotX), state.zoom*Math.cos(state.rotY)*Math.cos(state.rotX));
        camera.lookAt(0, 30, 0);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
