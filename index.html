<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Case & Drawer Modeler - Phase1</title>
<style>
body { margin:0; font-family:sans-serif; display:flex; }
#ui {
  width:300px;
  background:#f0f0f0;
  padding:10px;
  overflow:auto;
}
#canvas { flex:1; display:block; }
label { display:block; margin-top:8px; }
input, select, button { width:100%; margin-top:2px; }
.warning { color:red; font-weight:bold; }
</style>
</head>
<body>

<div id="ui">
<h3>基本設定</h3>

<label>種類</label>
<select id="type">
  <option value="case">ケース</option>
  <option value="drawer">引き出し</option>
</select>

<label>幅 (1-300mm)</label>
<input type="number" id="width" value="100">

<label>奥行 (1-300mm)</label>
<input type="number" id="depth" value="100">

<label>高さ (1-300mm)</label>
<input type="number" id="height" value="50">

<label>壁厚さ</label>
<input type="number" id="wall" value="3">

<label>スナップ</label>
<select id="snap">
  <option value="0.1">0.1</option>
  <option value="0.25">0.25</option>
  <option value="0.5">0.5</option>
  <option value="1" selected>1</option>
</select>

<label>背面タイプ（引き出し用）</label>
<select id="back">
  <option value="open">open</option>
  <option value="closed">closed</option>
</select>

<label><input type="checkbox" id="stack"> 重ねる</label>

<label>モード</label>
<select id="mode">
  <option value="edit">編集（上から）</option>
  <option value="view">表示（3D）</option>
</select>

<div class="warning" id="warning"></div>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let currentMesh = null;
let drawerMesh = null;

init();
animate();

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  renderer = new THREE.WebGLRenderer({canvas:document.getElementById("canvas"), antialias:true});
  resize();
  window.addEventListener("resize", resize);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 2000);
  camera.position.set(200,200,200);

  controls = new THREE.OrbitControls(camera, renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(200,300,200);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xffffff,0.5));

  document.querySelectorAll("input, select").forEach(el=>{
    el.addEventListener("input", updateModel);
  });

  updateModel();
}

function resize(){
  renderer.setSize(window.innerWidth-300, window.innerHeight);
  camera.aspect = (window.innerWidth-300)/window.innerHeight;
  camera.updateProjectionMatrix();
}

function snapValue(v){
  const s = parseFloat(document.getElementById("snap").value);
  return Math.round(v/s)*s;
}

function validate(w,d,h,wall){
  if(w<1||d<1||h<1||w>300||d>300||h>300){
    return "サイズは1〜300mm";
  }
  if(wall<1){
    return "壁厚さは1mm以上";
  }
  if(wall*2>=w||wall*2>=d||wall>=h){
    return "壁厚さが大きすぎる";
  }
  return "";
}

function clearScene(){
  if(currentMesh) scene.remove(currentMesh);
  if(drawerMesh) scene.remove(drawerMesh);
}

function updateModel(){

  let type = document.getElementById("type").value;
  let w = snapValue(parseFloat(document.getElementById("width").value));
  let d = snapValue(parseFloat(document.getElementById("depth").value));
  let h = snapValue(parseFloat(document.getElementById("height").value));
  let wall = snapValue(parseFloat(document.getElementById("wall").value));
  let stacking = document.getElementById("stack").checked;
  let mode = document.getElementById("mode").value;
  let back = document.getElementById("back").value;

  document.getElementById("width").value=w;
  document.getElementById("depth").value=d;
  document.getElementById("height").value=h;
  document.getElementById("wall").value=wall;

  const warn = validate(w,d,h,wall);
  document.getElementById("warning").innerText = warn;
  if(warn) return;

  clearScene();

  if(mode==="edit"){
    camera = new THREE.OrthographicCamera(-w, w, d, -d, 0.1, 2000);
    camera.position.set(0,500,0);
    camera.lookAt(0,0,0);
    controls.enabled=false;
  }else{
    camera = new THREE.PerspectiveCamera(45,(window.innerWidth-300)/window.innerHeight,0.1,2000);
    camera.position.set(200,200,200);
    controls = new THREE.OrbitControls(camera, renderer.domElement);
  }

  const outer = new THREE.BoxGeometry(w,h,d);
  const inner = new THREE.BoxGeometry(w-wall*2,h-wall,d-wall*2);

  const material = new THREE.MeshStandardMaterial({color:0xcccccc});
  const outerMesh = new THREE.Mesh(outer, material);

  const innerMesh = new THREE.Mesh(inner, material);
  innerMesh.position.y = wall/2;

  const box = new THREE.Group();
  box.add(outerMesh);
  box.add(innerMesh);

  if(type==="drawer"){
    const drawerGeom = new THREE.BoxGeometry(w-wall*2,h-wall,d-wall*2);
    const drawerMat = new THREE.MeshStandardMaterial({color:0x999999});
    drawerMesh = new THREE.Mesh(drawerGeom, drawerMat);
    drawerMesh.position.z = -d/4;
    scene.add(drawerMesh);
  }

  if(stacking){
    const clone = box.clone();
    clone.position.y = h+2;
    scene.add(clone);
  }

  currentMesh = box;
  scene.add(box);
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
</script>

</body>
</html>
