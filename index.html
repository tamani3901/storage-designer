<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Three Test</title>

<!-- Three.js 安定版 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#ui {
  position:fixed;
  left:0;
  top:0;
  width:250px;
  height:100%;
  background:#f0f0f0;
  padding:10px;
  box-sizing:border-box;
  z-index:10;
}
canvas { display:block; }
</style>
</head>
<body>

<div id="ui">
  <h3>表示テスト</h3>
  これが見えてればUIはOK
</div>

<canvas id="canvas"></canvas>

<script>
/* ===== デバッグ表示 ===== */

// JSエラーを画面に出す
window.onerror = function(message, source, lineno, colno, error) {
  document.body.innerHTML +=
    "<div style='position:fixed;bottom:0;left:0;background:red;color:white;padding:10px;font-size:12px;z-index:9999;max-width:100%;overflow:auto;'>"
    + message + "<br>Line: " + lineno + "</div>";
};

// Three読み込み確認
document.body.innerHTML +=
  "<div style='position:fixed;top:0;right:0;background:blue;color:white;padding:5px;z-index:9999;'>THREE: "
  + typeof THREE + "</div>";

/* ===== Three.js 本体 ===== */

let scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

let renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("canvas"),
  antialias:true
});

// UI分を引いたサイズ
function resize(){
  let w = Math.max(window.innerWidth - 250, 300);
  let h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

let camera = new THREE.PerspectiveCamera(
  45,
  (window.innerWidth-250)/window.innerHeight,
  0.1,
  2000
);

camera.position.set(200,200,200);
camera.lookAt(0,0,0);

window.addEventListener("resize", resize);
resize();

// ライト
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(200,300,200);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

// テスト用の箱
let geometry = new THREE.BoxGeometry(100,100,100);
let material = new THREE.MeshStandardMaterial({color:0x00aaee});
let cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// アニメーション
function animate(){
  requestAnimationFrame(animate);
  cube.rotation.y += 0.01;
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
