<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Storage Designer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; display: grid; grid-template: "header header" 50px "side main" 1fr "side foot" 250px / 250px 1fr; height: 100vh; font-family: sans-serif; }
        header { grid-area: header; background: #333; color: white; display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        aside { grid-area: side; background: #f0f0f0; padding: 15px; border-right: 1px solid #ccc; overflow-y: auto; }
        main { grid-area: main; background: #eee; position: relative; }
        footer { grid-area: foot; background: #fff; border-top: 2px solid #333; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; }
        input, select { width: 100%; }
        canvas { width: 100% !important; height: 100% !important; display: block; }
    </style>
</head>
<body>

<header>
    <strong>Storage Designer</strong>
    <div>
        クリアランス: 
        <select id="clearance">
            <option value="0.15">0.15mm</option>
            <option value="0.25" selected>0.25mm</option>
            <option value="0.35">0.35mm</option>
        </select>
    </div>
</header>

<aside id="controls">
    <div class="input-group">
        <label>内寸 幅 (mm)</label>
        <input type="number" id="width" value="100">
    </div>
    <div class="input-group">
        <label>内寸 奥行 (mm)</label>
        <input type="number" id="depth" value="150">
    </div>
    <div class="input-group">
        <label>内寸 高さ (mm)</label>
        <input type="number" id="height" value="50">
    </div>
    <hr>
    <div class="input-group">
        <label>壁厚 (mm)</label>
        <input type="number" id="wallThick" value="2" step="0.1">
    </div>
</aside>

<main id="container3d"></main>

<footer>
    <div style="padding:10px; color:#666;">2D Edit View (Drag partitions here)</div>
</footer>

<script>
    // --- Three.js Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeeeeee);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(200, 200, 200);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    document.getElementById('container3d').appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(100, 200, 100);
    scene.add(directionalLight);

    // --- Mesh Generation ---
    let drawerGroup = new THREE.Group();
    scene.add(drawerGroup);

    function updateModel() {
        drawerGroup.clear();
        
        const w = parseFloat(document.getElementById('width').value);
        const d = parseFloat(document.getElementById('depth').value);
        const h = parseFloat(document.getElementById('height').value);
        const t = parseFloat(document.getElementById('wallThick').value);

        const material = new THREE.MeshPhongMaterial({ color: 0x00aaff, transparent: true, opacity: 0.8 });

        // 底板
        const bottomGeo = new THREE.BoxGeometry(w + 2*t, t, d + 2*t);
        const bottom = new THREE.Mesh(bottomGeo, material);
        bottom.position.y = -h/2 - t/2;
        drawerGroup.add(bottom);

        // 側面（簡易的な4面配置）
        // 実際にはここでクリアランス計算やスリットのロジックを追加
    }

    // --- Interaction ---
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        const container = document.getElementById('container3d');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // 初期化
    const container = document.getElementById('container3d');
    renderer.setSize(container.clientWidth, container.clientHeight);
    updateModel();
    animate();

    // 入力監視
    document.querySelectorAll('input').forEach(el => el.addEventListener('input', updateModel));

</script>
</body>
</html>
