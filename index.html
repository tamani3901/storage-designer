<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Storage Designer v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; display: grid; grid-template: "header header" 50px "side main" 1fr "side foot" 200px / 260px 1fr; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        header { grid-area: header; background: #232f3e; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 100; }
        aside { grid-area: side; background: #f8f9fa; padding: 20px; border-right: 1px solid #dee2e6; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        main { grid-area: main; background: #ffffff; position: relative; touch-action: none; }
        footer { grid-area: foot; background: #ffffff; border-top: 2px solid #232f3e; position: relative; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #495057; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #3498db; outline: none; }
        .hint { font-size: 10px; color: #868e96; margin-top: 3px; }
        button { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <strong>Storage Designer</strong>
    <button onclick="resetView()">視点をリセット</button>
</header>

<aside>
    <div class="input-group">
        <label>内寸 幅 W (mm)</label>
        <input type="number" id="w_val" value="100">
    </div>
    <div class="input-group">
        <label>内寸 奥行 D (mm)</label>
        <input type="number" id="d_val" value="120">
    </div>
    <div class="input-group">
        <label>内寸 高さ H (mm)</label>
        <input type="number" id="h_val" value="40">
    </div>
    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
    <div class="input-group">
        <label>壁厚 / 底板厚 (mm)</label>
        <input type="number" id="thick" value="2.0" step="0.1">
        <div class="hint">※仕切りもこの厚みになります</div>
    </div>
</aside>

<main id="view3d"></main>

<footer>
    <canvas id="canvas2d" style="width:100%; height:100%;"></canvas>
    <div style="position:absolute; top:5px; left:10px; font-size:10px; color:#aaa; pointer-events:none;">2D EDIT VIEW</div>
</footer>

<script>
    // --- 初期変数 ---
    const container = document.getElementById('view3d');
    let width, depth, height, thickness;
    
    // --- Three.js Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8f9fa);
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // ライティング
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(100, 200, 150);
    scene.add(sun);

    // グリッド
    const grid = new THREE.GridHelper(500, 50, 0xdddddd, 0xeeeeee);
    scene.add(grid);

    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    // --- カメラ操作用変数 ---
    let isDragging = false;
    let theta = -Math.PI / 4; // 左右回転
    let phi = Math.PI / 3;    // 上下回転
    let radius = 350;         // 距離
    let target = new THREE.Vector3(0, 0, 0);
    let prevMouse = { x: 0, y: 0 };
    let prevTouchDist = 0;

    function updateCamera() {
        // 角度の制限（真上・真下で反転しないように）
        phi = Math.max(0.1, Math.min(Math.PI / 2.1, phi)); 
        
        camera.position.x = target.x + radius * Math.sin(phi) * Math.cos(theta);
        camera.position.y = target.y + radius * Math.cos(phi);
        camera.position.z = target.z + radius * Math.sin(phi) * Math.sin(theta);
        camera.lookAt(target);
    }

    function resetView() {
        theta = -Math.PI / 4;
        phi = Math.PI / 3;
        radius = 350;
        updateCamera();
    }

    // --- モデル更新ロジック ---
    function updateModel() {
        modelGroup.clear();
        
        width = parseFloat(document.getElementById('w_val').value) || 1;
        depth = parseFloat(document.getElementById('d_val').value) || 1;
        height = parseFloat(document.getElementById('h_val').value) || 1;
        thickness = parseFloat(document.getElementById('thick').value) || 1;

        // 注視点をモデルの中心（高さの半分）に合わせる
        target.set(0, height / 2, 0);

        const material = new THREE.MeshPhongMaterial({ color: 0x3498db, side: THREE.DoubleSide });

        // 底板
        const floor = new THREE.Mesh(new THREE.BoxGeometry(width + thickness*2, thickness, depth + thickness*2), material);
        floor.position.y = thickness / 2;
        modelGroup.add(floor);

        // 左右の壁
        const sideGeo = new THREE.BoxGeometry(thickness, height, depth + thickness*2);
        const wallL = new THREE.Mesh(sideGeo, material);
        wallL.position.set(-(width/2 + thickness/2), height/2 + thickness, 0);
        modelGroup.add(wallL);

        const wallR = new THREE.Mesh(sideGeo, material);
        wallR.position.set((width/2 + thickness/2), height/2 + thickness, 0);
        modelGroup.add(wallR);

        // 前後の壁
        const frontGeo = new THREE.BoxGeometry(width, height, thickness);
        const wallF = new THREE.Mesh(frontGeo, material);
        wallF.position.set(0, height/2 + thickness, (depth/2 + thickness/2));
        modelGroup.add(wallF);

        const wallB = new THREE.Mesh(frontGeo, material);
        wallB.position.set(0, height/2 + thickness, -(depth/2 + thickness/2));
        modelGroup.add(wallB);

        updateCamera(); // サイズ変更時にカメラ位置を再計算
    }

    // --- イベントリスナー（マウス・タッチ） ---
    container.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        theta += (e.clientX - prevMouse.x) * 0.01; // 符号を反転（直感的に）
        phi -= (e.clientY - prevMouse.y) * 0.01;
        prevMouse = { x: e.clientX, y: e.clientY };
        updateCamera();
    });

    container.addEventListener('touchstart', e => {
        isDragging = true;
        if (e.touches.length === 1) {
            prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
            prevTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }, {passive: false});

    container.addEventListener('touchmove', e => {
        if (!isDragging) return;
        if (e.touches.length === 1) {
            theta += (e.touches[0].clientX - prevMouse.x) * 0.01;
            phi -= (e.touches[0].clientY - prevMouse.y) * 0.01;
            prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            radius -= (dist - prevTouchDist) * 0.5;
            prevTouchDist = dist;
        }
        updateCamera();
        e.preventDefault();
    }, {passive: false});

    container.addEventListener('wheel', e => {
        radius += e.deltaY * 0.2;
        radius = Math.max(50, Math.min(1000, radius));
        updateCamera();
        e.preventDefault();
    }, {passive: false});

    // --- 実行 ---
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        updateCamera();
    });

    document.querySelectorAll('input').forEach(el => el.addEventListener('input', updateModel));
    
    // 初回起動
    const initSize = () => {
        renderer.setSize(container.clientWidth, container.clientHeight);
        updateModel();
        animate();
    };
    
    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    
    initSize();

</script>
</body>
</html>
